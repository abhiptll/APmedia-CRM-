<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="APmedia">
<meta name="theme-color" content="#090807">
<title>APmedia Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0}
:root{
  --bg:#090807;--s1:#111010;--s2:#171513;--s3:#1E1B19;
  --b1:#222020;--b2:#2E2A28;--b3:#3A3634;
  --tx:#EAE7E4;--mu:#79726C;--di:#3C3835;
  --bl:#3B82F6;--bl2:#1D4ED8;--blg:rgba(59,130,246,.28);
  --gn:#10B981;--gng:rgba(16,185,129,.28);
  --am:#F59E0B;--amg:rgba(245,158,11,.4);
  --rd:#EF4444;
  --sw:220px;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
.serif{font-family:'Fraunces',serif;font-optical-sizing:auto}
.num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* SHELL */
#shell{display:flex;height:100dvh;padding-top:var(--sat)}

/* SIDEBAR */
#sb{width:var(--sw);min-width:var(--sw);background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;padding:24px 12px 18px;height:100%}
.logo{display:flex;align-items:center;gap:8px;padding:2px 8px;margin-bottom:26px}
.logo-dot{width:8px;height:8px;background:var(--bl);border-radius:50%;box-shadow:0 0 12px var(--blg);flex-shrink:0}
.logo-tx{font-family:'Fraunces',serif;font-size:18px;font-weight:300;color:var(--tx);letter-spacing:-.02em}
.logo-tx em{color:var(--di);font-style:italic}
.nav-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--di);font-weight:700;padding:0 9px;margin:16px 0 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 9px;border-radius:10px;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;border:1px solid transparent;background:none;width:100%;text-align:left;transition:color .1s,background .1s,border-color .1s;font-family:inherit}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.on{color:#93C5FD;background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.18)}
.ni .nb{margin-left:auto;background:var(--am);color:#000;font-size:9px;font-weight:700;border-radius:20px;padding:2px 6px}
.sb-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--b1)}
.sb-email{font-size:11px;color:var(--di);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;margin-bottom:6px}
.so-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#7F1D1D;font-family:inherit;padding:0 4px}

/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding:32px 36px 36px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--b1)}
.pt{font-family:'Fraunces',serif;font-size:27px;font-weight:300;color:#fff;letter-spacing:-.03em;line-height:1}
.ps{font-size:12px;color:var(--mu);margin-top:4px}

/* STAT CARDS */
.sg{display:grid;gap:10px;margin-bottom:18px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px 18px}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--di);font-weight:700;margin-bottom:6px}
.sv{font-family:'Fraunces',serif;font-size:31px;font-weight:300;letter-spacing:-.02em;line-height:1}
.ss{font-size:11px;color:var(--mu);margin-top:5px}
.pb{background:var(--s3);border-radius:99px;height:3px;margin-top:8px;overflow:hidden}
.pbf{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:10px;cursor:pointer;transition:background .12s,box-shadow .12s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-blue{background:var(--bl);color:#fff;padding:10px 16px;font-size:13px;box-shadow:0 0 16px rgba(59,130,246,.2)}
.btn-blue:hover{background:var(--bl2)}
.btn-blue:disabled{opacity:.5;cursor:default}
.btn-ghost{background:transparent;color:var(--mu);padding:9px 13px;font-size:13px;border:1px solid var(--b2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--b3)}
.bx{background:none;border:none;cursor:pointer;color:var(--di);font-size:20px;line-height:1;padding:3px 6px;border-radius:7px;transition:color .1s,background .1s;font-family:inherit}
.bx:hover{color:var(--rd);background:rgba(239,68,68,.1)}

/* DOTS */
.dot{display:inline-block;border-radius:50%;flex-shrink:0}
.d-s{width:9px;height:9px;background:#6B7280}
.d-r{width:9px;height:9px;background:var(--bl);box-shadow:0 0 7px var(--blg)}
.d-f{width:9px;height:9px;background:var(--am);box-shadow:0 0 7px var(--amg)}
.d-c{width:9px;height:9px;background:var(--gn);box-shadow:0 0 7px var(--gng)}
.d-n{width:9px;height:9px;background:var(--rd);box-shadow:0 0 6px rgba(239,68,68,.35)}

/* INPUTS */
.field{background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;border-radius:10px;width:100%;transition:border-color .12s;-webkit-appearance:none}
.field::placeholder{color:var(--di)}
.field:focus{outline:none;border-color:var(--bl);background:var(--s3)}
textarea.field{resize:vertical;min-height:64px;line-height:1.5}
select.field{cursor:pointer}

/* TABLE */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.th{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--di);font-weight:700;padding:9px 15px;text-align:left;background:rgba(12,11,10,.7);border-bottom:1px solid var(--b1)}
.td{padding:11px 15px;border-bottom:1px solid rgba(34,32,32,.5);vertical-align:middle}
.tr{transition:background .08s}
.tr:hover{background:rgba(22,20,18,.8)}
.tr:last-child .td{border-bottom:none}

/* TOOLBAR */
.tb{padding:11px 15px;border-bottom:1px solid var(--b1);display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:rgba(10,9,8,.5)}
.pill{font-size:11px;font-weight:500;padding:5px 10px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer;transition:color .1s,background .1s,border-color .1s;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.pill:hover{color:var(--tx);border-color:var(--b2)}
.pill.on{background:var(--s3);border-color:var(--b2);color:var(--tx)}

/* FORM PANEL */
.fp{background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:18px;margin-bottom:14px;animation:fu .15s ease-out}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ff{grid-column:1/-1}

/* SECTION */
.sec{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;margin-bottom:13px}
.stl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--di);font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.mb{background:var(--s1);border:1px solid var(--b2);border-radius:19px;padding:24px;width:100%;max-height:88dvh;overflow-y:auto;animation:si .17s cubic-bezier(.34,1.56,.64,1)}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.mt{font-size:15px;font-weight:600;color:var(--tx)}
.msb{font-size:11px;color:var(--mu);margin-top:3px}

/* DM */
.dm-out{background:var(--s2);border:1px solid var(--b2);border-radius:11px;padding:14px 16px;font-size:13.5px;line-height:1.7;color:var(--tx);min-height:88px;white-space:pre-wrap;margin:13px 0}
.dm-out.loading{color:var(--mu);font-style:italic;display:flex;align-items:center;gap:9px;min-height:60px}
.spin{width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--bl);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.vtab{font-size:11px;font-weight:500;padding:5px 10px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;font-family:inherit;transition:background .1s,color .1s,border-color .1s}
.vtab:hover,.vtab.on{background:var(--bl);color:#fff;border-color:var(--bl)}

/* PRICES */
.pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.pkg{background:var(--s2);border:1px solid var(--b1);border-radius:13px;padding:16px;position:relative;transition:border-color .12s}
.pkg:hover{border-color:var(--b2)}
.pkg-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--di);font-size:15px;cursor:pointer;opacity:0;transition:all .12s;padding:0;line-height:1}
.pkg:hover .pkg-del{opacity:1}
.pkg-del:hover{color:var(--rd)}

/* PRICE INPUT */
.pin{background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--gn);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;font-variant-numeric:tabular-nums;outline:none;width:58px;padding:2px 0;transition:border-color .12s}
.pin:focus{border-color:var(--gn)}
.pin::placeholder{color:var(--di);font-weight:400}
.ssel{background:transparent;border:none;color:var(--mu);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none}
.ie{background:transparent;border:none;font-family:'DM Sans',sans-serif;color:var(--mu);font-size:12px;outline:none;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .12s;padding:0;width:100%;max-width:138px}
.ie:focus{border-color:var(--di);color:var(--tx)}

/* MISC */
.empty{padding:48px 24px;text-align:center;color:var(--mu);font-size:13px}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;background:rgba(59,130,246,.1);color:#93C5FD;border:1px solid rgba(59,130,246,.16)}
.alert{background:rgba(120,53,15,.14);border:1px solid rgba(217,119,6,.22);border-radius:11px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:9px}
.ar{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(34,32,32,.38)}
.ar:last-child{border-bottom:none}

/* LOGIN */
.lw{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:32px}
.lc{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:40px 36px;width:100%;max-width:320px;text-align:center}
.gb{width:100%;padding:13px;background:var(--s2);border:1px solid var(--b2);border-radius:11px;color:var(--tx);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'DM Sans',sans-serif;transition:background .12s;margin-top:24px}
.gb:hover{background:var(--s3)}

/* ANIM */
.fade{animation:fu .18s ease-out}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* API KEY BANNER */
.api-banner{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:11px;padding:12px 15px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createClient}=window.supabase;
const SB=createClient("https://nyawnrewrjsmmqmkkdig.supabase.co","sb_publishable_Fjuz60z2vdbF49NIufoHfA_AyTHgfb5");
const STATS=['Sent','Responded','Follow Up','Closed','Not Interested'];
const DM={'Sent':'d-s','Responded':'d-r','Follow Up':'d-f','Closed':'d-c','Not Interested':'d-n'};
const SPORTS=['Football','Basketball','Baseball','Soccer','Lacrosse','Wrestling','Track','Tennis','Volleyball','Other'];

let S={
  user:null,view:'dash',leads:[],filter:'All',search:'',
  showForm:false,delId:null,
  dmLead:null,dmText:'',dmVar:0,dmLoading:false,
  authLoading:false,
  pkgs:[
    {id:1,name:'Commitment Post',price:25,desc:'Graphic post for commitment announcement, 24hr turnaround'},
    {id:2,name:'Highlight Reel',price:75,desc:'60-sec edited reel, music, graphics, 1 revision'},
    {id:3,name:'Full Mixtape',price:150,desc:'3–5 min mixtape, music, 2 revisions, social cuts'},
    {id:4,name:'Social Pack',price:250,desc:'Mixtape + 3 short clips + story covers'},
  ],
  settings:{dailyGoal:10,revenueGoal:500},
};

/* ── STORAGE ── */
const lk=k=>`ap_${k}_${S.user?.id}`;
const ls=(k,v)=>{try{if(S.user)localStorage.setItem(lk(k),JSON.stringify(v))}catch{}};
const lg=(k,fb)=>{try{const v=localStorage.getItem(lk(k));return v?JSON.parse(v):fb}catch{return fb}};
const exk=()=>`ap_ex_${S.user?.id}`;
const exl=()=>{try{return JSON.parse(localStorage.getItem(exk())||'{}')}catch{return{}}};
const exs=m=>localStorage.setItem(exk(),JSON.stringify(m));
const ext=(id,p)=>{const m=exl();m[id]={...m[id],...p};exs(m)};
const merge=ls2=>{const ex=exl();return ls2.map(l=>({...l,...(ex[l.id]||{})}))};
const getApiKey=()=>localStorage.getItem('ap_apikey')||'';
const setApiKey=v=>localStorage.setItem('ap_apikey',v.trim());

/* ── AUTH ── */
async function boot(){
  const {data:{session}}=await SB.auth.getSession();
  S.user=session?.user??null;
  SB.auth.onAuthStateChange((_,s)=>{S.user=s?.user??null;S.user?loadAll():render()});
  S.user?loadAll():render();
}
async function loadAll(){
  const {data,error}=await SB.from('leads').select('*').order('created_at',{ascending:false});
  if(!error&&data)S.leads=merge(data);
  S.pkgs=lg('pkgs',S.pkgs);
  S.settings={...S.settings,...lg('settings',{})};
  render();
}

/* ── UTILS ── */
const today=()=>new Date().toISOString().slice(0,10);
const fd=s=>{if(!s)return'';const d=s.slice(0,10).split('-');return`${+d[1]}/${+d[2]}`};
const esc=s=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
let searchTimer=null;

function stats(){
  const all=S.leads,n=all.length,t=today();
  const st=all.filter(l=>(l.date||'').startsWith(t)).length;
  const re=all.filter(l=>['Responded','Closed'].includes(l.status)).length;
  const cl=all.filter(l=>l.status==='Closed').length;
  const rv=all.reduce((a,l)=>a+(parseFloat(l.price)||0),0);
  return{n,st,re,cl,rv,
    rr:n?Math.round(re/n*100):0,
    cr:n?Math.round(cl/n*100):0,
    gp:S.settings.revenueGoal?Math.min(100,Math.round(rv/S.settings.revenueGoal*100)):0,
    dp:S.settings.dailyGoal?Math.min(100,Math.round(st/S.settings.dailyGoal*100)):0,
    rem:Math.max(0,S.settings.dailyGoal-st)
  };
}
function stale(){return S.leads.filter(l=>l.status==='Sent'&&(Date.now()-new Date(l.date||l.created_at))/864e5>=3)}
function filtered(){
  let l=[...S.leads];
  if(S.filter!=='All')l=l.filter(x=>x.status===S.filter);
  if(S.search.trim()){const q=S.search.trim().toLowerCase();l=l.filter(x=>(x.name||'').toLowerCase().includes(q)||(x.school||'').toLowerCase().includes(q)||(x.ig||'').toLowerCase().includes(q))}
  return l;
}

/* ── RENDER ── */
function render(){
  const root=document.getElementById('root');
  if(!S.user){root.innerHTML=loginHTML();return}
  const sl=stale().length,s=stats();
  root.innerHTML=`
    <div id="shell">
      ${sidebar(sl)}
      <div id="main">${S.view==='dash'?dashHTML(s,sl):S.view==='pipeline'?pipeHTML(s,sl):pkgsHTML()}</div>
    </div>
    ${S.delId?delModal():''}
    ${S.dmLead?dmModal():''}`;
}

/* ── SIDEBAR ── */
function sidebar(sl){
  const n=(v,lbl,ico,badge='')=>`<button onclick="AP.go('${v}')" class="ni${S.view===v?' on':''}">
    ${ico}<span style="flex:1">${lbl}</span>${badge}
  </button>`;
  return`<div id="sb">
    <div>
      <div class="logo"><div class="logo-dot"></div><div class="logo-tx">APmedia <em>hub</em></div></div>
      ${n('dash','Dashboard',`<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>`)}
      ${n('pipeline','Pipeline',`<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>`,sl?`<span class="nb">${sl}</span>`:'')}
      ${n('pkgs','Packages',`<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>`)}
    </div>
    <div class="sb-foot">
      <div class="sb-email">${esc(S.user?.email||'')}</div>
      <button class="so-btn" onclick="AP.logout()">Sign out</button>
    </div>
  </div>`;
}

/* ── DASHBOARD ── */
function dashHTML(s,sl){
  const h=new Date().getHours();
  const greet=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  const late=stale();
  const responded=S.leads.filter(l=>l.status==='Responded');
  const recent=S.leads.slice(0,6);
  const closed=S.leads.filter(l=>l.status==='Closed').slice(0,4);
  const hasKey=!!getApiKey();
  return`<div class="fade">
    <div style="margin-bottom:22px">
      <div class="serif" style="font-size:24px;font-weight:300;color:#fff;letter-spacing:-.02em">${greet} ✦</div>
      <div style="font-size:12px;color:var(--mu);margin-top:4px">Here's where APmedia stands today.</div>
    </div>

    ${!hasKey?`<div class="api-banner">
      <svg width="14" height="14" fill="none" stroke="#C4B5FD" stroke-width="2" viewBox="0 0 24 24"><path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      <span style="font-size:12px;color:#C4B5FD;flex:1">Add your Anthropic API key to enable AI DM generation</span>
      <button onclick="AP.showKeyModal()" style="font-size:11px;background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.35);color:#C4B5FD;padding:5px 11px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:600">Add Key →</button>
    </div>`:''}

    <div class="sg" style="grid-template-columns:repeat(4,1fr)">
      <div class="sc">
        <div class="sl">Today's DMs</div>
        <div class="sv num" style="color:#fff">${s.st}<span style="color:var(--di);font-size:15px;font-family:'DM Sans',sans-serif"> /${S.settings.dailyGoal}</span></div>
        <div class="pb"><div class="pbf" style="width:${s.dp}%;background:var(--bl)"></div></div>
        <div class="ss">${s.rem} left to hit goal</div>
      </div>
      <div class="sc">
        <div class="sl">Reply Rate</div>
        <div class="sv num" style="color:var(--bl)">${s.rr}%</div>
        <div class="ss">${s.re} of ${s.n} replied</div>
      </div>
      <div class="sc">
        <div class="sl">Closed</div>
        <div class="sv num" style="color:var(--gn)">${s.cl}</div>
        <div class="ss">${s.cr}% close rate</div>
      </div>

const PROMPTS={
  0:l=>`You write Instagram DMs for APmedia, a sports media editor who makes highlight reels and commitment videos for high school athletes.

Write a short, genuine cold DM to ${l.name}${l.college?`, who just committed to ${l.college}`:' (high school athlete)'}${l.sport?` for ${l.sport}`:''}${l.school?` from ${l.school}`:''}.

Rules:
- Sound like a real teenage/young person, not marketing copy
- Mention their commitment or sport specifically if available
- Briefly say you make highlight reels / commitment videos
- Ask if they're interested in one
- Max 3-4 sentences
- 1 emoji max, no hashtags, no "Hey there!"

Write ONLY the DM message. Nothing else.`,

  1:l=>`You write Instagram DMs for APmedia, a sports media editor.

Write a short follow-up to ${l.name}${l.college?` (committed to ${l.college})`:''} who hasn't replied yet.

Rules:
- Mention you reached out before, keep it light
- Not needy or pushy
- 2-3 sentences max
- Easy for them to respond

Write ONLY the message.`,

  2:l=>`You write for APmedia, a sports media editor.

Write a comment to drop on ${l.name}'s commitment post${l.college?` to ${l.college}`:''}${l.sport?` for ${l.sport}`:''}.

Rules:
- Congratulate them genuinely first
- Naturally mention you make commitment videos
- Ask if they want one
- 2 sentences max, sounds organic not like an ad

Write ONLY the comment.`
};

async function callAI(prompt){
  const key=getApiKey();
  if(!key)return'No API key set. Add your key to use the DM generator.';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:200,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!r.ok){const e=await r.json();return`Error: ${e.error?.message||r.status}`}
    const d=await r.json();
    return d.content?.[0]?.text?.trim()||'No response. Try again.';
  }catch(e){return`Network error: ${e.message}`}
}

/* ── ACTIONS ── */
async function addLead(d){
  const row={user_id:S.user.id,name:d.name,ig:d.ig,school:d.school,college:d.college,date:d.date,status:d.status};
  const {data,error}=await SB.from('leads').insert([row]).select().single();
  if(error){alert('Error: '+error.message);return}
  if(data?.id)ext(data.id,{price:d.price||0,sport:d.sport||'',notes:d.notes||''});
  S.showForm=false;loadAll();
}

window.AP={
  login:async()=>{S.authLoading=true;render();await SB.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}})},
  logout:async()=>{await SB.auth.signOut();S.leads=[];render()},
  go:v=>{S.view=v;S.showForm=false;S.filter='All';render()},
  filter:v=>{S.filter=v;render()},
  openForm:()=>{S.showForm=true;render()},
  closeForm:()=>{S.showForm=false;render()},

  submitForm(form){
    const fd=new FormData(form),d={};
    for(const[k,v]of fd.entries())d[k]=(v||'').trim();
    d.price=d.pkg_price==='custom'?parseFloat(d.custom_price)||0:parseFloat(d.pkg_price)||0;
    delete d.pkg_price;delete d.custom_price;
    d.date=today();d.status='Sent';
    if(d.name)addLead(d);
  },

  setStatus:async(id,status)=>{
    await SB.from('leads').update({status}).eq('id',id);
    const l=S.leads.find(x=>x.id===id);if(l)l.status=status;
    // only re-render the relevant part
    render();
  },
  setPrice:(id,val)=>{
    ext(id,{price:parseFloat(val)||0});
    const l=S.leads.find(x=>x.id===id);if(l)l.price=parseFloat(val)||0;
  },
  setNotes:(id,val)=>{
    ext(id,{notes:val});
    const l=S.leads.find(x=>x.id===id);if(l)l.notes=val;
  },

  confirmDelete:id=>{S.delId=id;render()},
  cancelDel:()=>{S.delId=null;render()},
  deleteLead:async id=>{
    await SB.from('leads').delete().eq('id',id);
    const ex=exl();delete ex[id];exs(ex);
    S.leads=S.leads.filter(l=>l.id!==id);
    S.delId=null;render();
  },

  saveSettings(form){
    const fd=new FormData(form);
    S.settings.dailyGoal=Math.max(1,parseInt(fd.get('dailyGoal'))||10);
    S.settings.revenueGoal=Math.max(0,parseInt(fd.get('revenueGoal'))||500);
    ls('settings',S.settings);render();
  },

  addPkg(){
    const name=prompt('Package name:');if(!name)return;
    const price=prompt('Price ($):');if(!price)return;
    const desc=prompt("Short description (what's included):")??'';
    S.pkgs.push({id:Date.now(),name:name.trim(),price:parseInt(price)||0,desc:desc.trim()});
    ls('pkgs',S.pkgs);render();
  },
  editPkg(i){
    const p=S.pkgs[i];if(!p)return;
    const name=prompt('Package name:',p.name);if(name===null)return;
    const price=prompt('Price ($):',p.price);if(price===null)return;
    const desc=prompt('Description:',p.desc)??p.desc;
    S.pkgs[i]={...p,name:name.trim(),price:parseInt(price)||0,desc:desc.trim()};
    ls('pkgs',S.pkgs);render();
  },
  delPkg(i){
    if(!confirm(`Remove "${S.pkgs[i]?.name}"?`))return;
    S.pkgs.splice(i,1);ls('pkgs',S.pkgs);render();
  },

  openDM(id){
    const l=S.leads.find(x=>x.id===id);if(!l)return;
    S.dmLead=l;S.dmText='';S.dmVar=0;S.dmLoading=false;render();
  },
  closeDM(){S.dmLead=null;S.dmText='';S.dmLoading=false;render()},
  setDMVar(i){S.dmVar=i;S.dmText='';render()},
  async generateDM(){
    if(!S.dmLead)return;
    S.dmLoading=true;S.dmText='';render();
    S.dmText=await callAI(PROMPTS[S.dmVar](S.dmLead));
    S.dmLoading=false;render();
  },
  copyDM(){
    if(!S.dmText)return;
    navigator.clipboard.writeText(S.dmText).then(()=>{
      const b=document.getElementById('cpb');
      if(b){b.textContent='✓ Copied!';b.style.color='var(--gn)';setTimeout(()=>{if(b)b.textContent='Copy DM';b.style.color=''},2000)}
    });
  },
  markSent(id){
    SB.from('leads').update({status:'Sent'}).eq('id',id);
    const l=S.leads.find(x=>x.id===id);if(l)l.status='Sent';
    S.dmLead=null;S.dmText='';render();
  },

  showKeyModal(){showingKeyModal=true;render()},
  saveKey(){
    const v=document.getElementById('key-input')?.value?.trim();
    if(!v)return;
    setApiKey(v);showingKeyModal=false;render();
  },
  saveKeyInline(){
    const v=document.getElementById('inline-key')?.value?.trim();
    if(!v)return alert('Paste your API key first.');
    setApiKey(v);render();
  },
};

  if(showingKeyModal){
    const extra=document.createElement('div');

    document.getElementById('root').appendChild(extra.firstElementChild);
