<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APmedia Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { font-family: 'Geist', system-ui, sans-serif; background: #0C0A09; color: #E7E5E4; }
  .serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
  .ring-focus:focus { outline: none; border-color: #3B82F6; }
  
  /* Dark Mode Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #1C1917; }
  ::-webkit-scrollbar-thumb { background: #44403C; border-radius: 3px; }
  .scroll-hide::-webkit-scrollbar { display: none; }
  
  .row-hover:hover { background: #1C1917; }
  
  /* Customized Minimalist Badges with Blue accents */
  .badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px; display: inline-block; letter-spacing: 0.02em; }
  .b-sent { background: #292524; color: #A8A29E; border: 1px solid #44403C; }
  .b-resp { background: #1E3A8A; color: #93C5FD; border: 1px solid #2563EB; }
  .b-foll { background: #78350F; color: #FCD34D; border: 1px solid #D97706; }
  .b-clos { background: #064E3B; color: #6EE7B7; border: 1px solid #059669; }
  .b-ni   { background: #7F1D1D; color: #FCA5A5; border: 1px solid #DC2626; }
  
  .fade-in { animation: fade 0.2s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
  .logo-dot { display: inline-block; width: 7px; height: 7px; background: #3B82F6; border-radius: 999px; vertical-align: middle; margin: 0 4px 4px 0; }
</style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

<div id="app" class="w-full min-h-screen flex flex-col md:flex-row"></div>

<script type="module">
const STATUSES = ['Sent', 'Responded', 'Follow Up', 'Closed', 'Not Interested'];
const STATUS_CLASS = { 'Sent':'b-sent','Responded':'b-resp','Follow Up':'b-foll','Closed':'b-clos','Not Interested':'b-ni' };

const SUPABASE_URL = "https://nyawnrewrjsmmqmkkdig.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Fjuz60z2vdbF49NIufoHfA_AyTHgfb5";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = {
  user: null,
  currentView: 'crm', // Options: 'crm', 'gallery', 'analytics'
  leads: [],
  analyticsLogs: [
    { date: '2026-05-10', platform: 'Instagram Reels', views: 14200, notes: 'Basketball mixtape' },
    { date: '2026-05-14', platform: 'TikTok', views: 28500, notes: 'Football player spotlight' }
  ],
  galleryItems: [
    { id: 1, title: 'Friday Night Lights', category: 'Football', url: 'https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff?w=600&auto=format&fit=crop&q=60' },
    { id: 2, title: 'In the Zone', category: 'Basketball', url: 'https://images.unsplash.com/photo-1546519638-68e109498ffc?w=600&auto=format&fit=crop&q=60' }
  ],
  settings: { dailyGoal: 10, pricePerEdit: 25, revenueGoal: 500 },
  filter: 'All',
  search: '',
  sort: 'date-new',
  showForm: false,
  authLoading: false
};

async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  state.user = session ? session.user : null;
  
  supabase.auth.onAuthStateChange((_event, session) => {
    state.user = session ? session.user : null;
    if (state.user) { loadData(); } else { render(); }
  });

  if (state.user) { loadData(); } else { render(); }
}

async function loadData() {
  const { data: leads, error } = await supabase.from('leads').select('*').order('created_at', { ascending: false });
  if (!error && leads) state.leads = leads;
  const localConfig = localStorage.getItem(`apmedia_settings_${state.user?.id}`);
  if (localConfig) state.settings = { ...state.settings, ...JSON.parse(localConfig) };
  render();
}

const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate = (s) => { if (!s) return ''; const [y,m,d] = s.split('-'); return `${parseInt(m)}/${parseInt(d)}`; };

function stats() {
  const total = state.leads.length;
  const today = todayStr();
  const sentToday = state.leads.filter(l => l.date === today).length;
  const responded = state.leads.filter(l => l.status === 'Responded' || l.status === 'Closed').length;
  const closed = state.leads.filter(l => l.status === 'Closed').length;
  const revenue = closed * state.settings.pricePerEdit;
  return {
    total, sentToday, responded, closed, revenue,
    remaining: Math.max(0, state.settings.dailyGoal - sentToday),
    responseRate: total ? Math.round((responded / total) * 100) : 0,
    convRate: total ? Math.round((closed / total) * 100) : 0,
  };
}

function processedLeads() {
  let list = [...state.leads];
  if (state.filter !== 'All') list = list.filter(l => l.status === state.filter);
  if (state.search.trim()) {
    const q = state.search.trim().toLowerCase();
    list = list.filter(l => (l.name||'').toLowerCase().includes(q) || (l.school||'').toLowerCase().includes(q));
  }
  return list;
}

function renderSidebar() {
  return `
    <aside class="w-full md:w-64 bg-[#141211] border-b md:border-b-0 md:border-r border-stone-800 p-6 flex flex-col justify-between shrink-0">
      <div>
        <h1 class="serif text-2xl font-light tracking-tight text-white mb-8 flex items-center">
          <span class="logo-dot"></span>APmedia <span class="italic font-normal text-stone-500 ml-1">hub</span>
        </h1>
        
        <nav class="flex flex-row md:flex-col gap-2 overflow-x-auto scroll-hide">
          ${navLink('crm', 'Pipeline (CRM)', `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>`)}
          ${navLink('gallery', 'Shot Gallery', `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`)}
          ${navLink('analytics', 'Metrics Engine', `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>`)}
        </nav>
      </div>
      
      <div class="mt-6 pt-4 border-t border-stone-800 text-xs text-stone-500 hidden md:block">
        <p class="truncate font-medium text-stone-400">${state.user?.email || ''}</p>
        <button onclick="window.__a.logout()" class="text-red-400 hover:underline mt-1 block">Sign Out</button>
      </div>
    </aside>
  `;
}

function navLink(view, label, icon) {
  const active = state.currentView === view;
  return `
    <button onclick="window.__a.setView('${view}')" 
      class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition whitespace-nowrap w-full
      ${active ? 'bg-blue-950/40 text-blue-400 border border-blue-900/50' : 'text-stone-400 hover:text-stone-200 hover:bg-stone-900/50 border border-transparent'}">
      ${icon} <span>${label}</span>
    </button>
  `;
}

function render() {
  const appContainer = document.getElementById('app');

  if (!state.user) {
    appContainer.innerHTML = `
      <div class="min-h-screen w-full flex flex-col justify-center items-center px-6 bg-[#0C0A09]">
        <div class="max-w-md w-full bg-[#141211] border border-stone-800 rounded-2xl p-8 shadow-2xl text-center fade-in">
          <h1 class="serif text-4xl font-light tracking-tight text-white mb-2">
            <span class="logo-dot"></span>APmedia <span class="italic font-normal text-stone-500">hub</span>
          </h1>
          <p class="text-sm text-stone-500 mb-8">Production pipeline & portfolio optimization system.</p>
          <button onclick="window.__a.login()" ${state.authLoading ? 'disabled' : ''}
            class="w-full py-3.5 border border-stone-800 bg-stone-900 hover:bg-stone-800 text-white rounded-xl text-sm font-medium transition flex justify-center items-center gap-3 shadow-md">
            ${state.authLoading ? 'Syncing Ecosystem...' : 'Access via Google Workspace'}
          </button>
        </div>
      </div>
    `;
    return;
  }

  let viewContent = '';
  if (state.currentView === 'crm') { viewContent = renderCRM(); }
  else if (state.currentView === 'gallery') { viewContent = renderGallery(); }
  else if (state.currentView === 'analytics') { viewContent = renderAnalytics(); }

  appContainer.innerHTML = `
    ${renderSidebar()}
    <main class="flex-1 bg-[#0C0A09] p-6 md:p-10 overflow-y-auto max-w-6xl mx-auto w-full">
      ${viewContent}
    </main>
  `;
}

function renderCRM() {
  const s = stats();
  const list = processedLeads();
  return `
    <div class="fade-in">
      <header class="flex items-center justify-between mb-8 pb-4 border-b border-stone-800">
        <div>
          <h2 class="serif text-3xl font-light text-white">Outreach Pipeline</h2>
          <p class="text-xs text-stone-500 mt-1">Real-time athlete engagement pipeline engine.</p>
        </div>
        <button onclick="window.__a.toggleForm()" class="text-xs px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 transition font-medium">+ Add Athlete</button>
      </header>

      <section class="grid sm:grid-cols-3 gap-4 mb-8">
        <div class="bg-[#141211] border border-stone-800 rounded-xl p-5">
          <div class="text-xs uppercase tracking-wider text-stone-500 mb-2 font-medium">Daily Goal Tracking</div>
          <div class="serif text-4xl font-light text-white num">${s.sentToday}<span class="text-stone-600 text-xl"> / ${state.settings.dailyGoal}</span></div>
        </div>
        <div class="bg-[#141211] border border-stone-800 rounded-xl p-5">
          <div class="text-xs uppercase tracking-wider text-stone-500 mb-2 font-medium">Pipeline Metrics</div>
          <div class="serif text-4xl font-light text-blue-400 num">${s.responseRate}% <span class="text-stone-600 text-xl font-sans tracking-normal">Reply Rate</span></div>
        </div>
        <div class="bg-[#141211] border border-stone-800 rounded-xl p-5">
          <div class="text-xs uppercase tracking-wider text-stone-500 mb-2 font-medium">Gross Bookings</div>
          <div class="serif text-4xl font-light text-emerald-500 num">$${s.revenue}</div>
        </div>
      </section>

      ${state.showForm ? formHTML() : ''}

      <div class="bg-[#141211] border border-stone-800 rounded-xl overflow-hidden">
        <div class="p-4 border-b border-stone-800 flex gap-2">
          <input type="text" placeholder="Search targets..." value="${escapeHtml(state.search)}"
            oninput="window.__a.setSearch(this.value)"
            class="bg-stone-900 border border-stone-800 px-4 py-1.5 rounded-lg text-sm w-full ring-focus text-stone-200 placeholder-stone-600" />
        </div>
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="text-stone-500 border-b border-stone-800 bg-stone-900/30 text-xs uppercase tracking-wider">
              <th class="px-5 py-3 font-medium">Athlete Details</th>
              <th class="px-5 py-3 font-medium">Commitment</th>
              <th class="px-5 py-3 font-medium">Status Flag</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody>
            ${list.map(l => `
              <tr class="border-b border-stone-800/60 row-hover transition">
                <td class="px-5 py-3.5">
                  <div class="font-medium text-stone-200">${escapeHtml(l.name)}</div>
                  <div class="text-xs text-stone-500">${escapeHtml(l.school || '')} ${l.ig ? `· ${escapeHtml(l.ig)}` : ''}</div>
                </td>
                <td class="px-5 py-3.5 text-stone-400">${escapeHtml(l.college || '—')}</td>
                <td class="px-5 py-3.5">
                  <select onchange="window.__a.updateLead('${l.id}', { status: this.value })"
                    class="badge ${STATUS_CLASS[l.status]} bg-transparent ring-focus cursor-pointer appearance-none">
                    ${STATUSES.map(st => `<option value="${st}" ${st===l.status?'selected':''} class="bg-stone-950 text-white">${st}</option>`).join('')}
                  </select>
                </td>
                <td class="px-5 py-3.5 text-right"><button onclick="window.__a.deleteLead('${l.id}')" class="text-stone-600 hover:text-red-400 text-lg">×</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderGallery() {
  return `
    <div class="fade-in">
      <header class="flex items-center justify-between mb-8 pb-4 border-b border-stone-800">
        <div>
          <h2 class="serif text-3xl font-light text-white">Media Vault</h2>
          <p class="text-xs text-stone-500 mt-1">High-impact media showcase archive.</p>
        </div>
        <button class="text-xs px-4 py-2 border border-stone-700 rounded-lg hover:bg-stone-900 text-stone-300 transition font-medium">+ Add Asset</button>
      </header>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        ${state.galleryItems.map(item => `
          <div class="group bg-[#141211] border border-stone-800 rounded-xl overflow-hidden shadow-lg transition hover:border-blue-900">
            <div class="aspect-video w-full bg-stone-900 overflow-hidden relative">
              <img src="${item.url}" class="w-full h-full object-cover grayscale contrast-125 group-hover:grayscale-0 transition duration-500" alt="Shot Asset">
              <span class="absolute top-3 left-3 bg-stone-950/80 backdrop-blur border border-stone-800 text-[10px] text-blue-400 uppercase font-bold tracking-widest px-2 py-0.5 rounded">
                ${item.category}
              </span>
            </div>
            <div class="p-4 flex items-center justify-between">
              <div>
                <h4 class="font-medium text-stone-200 text-sm">${item.title}</h4>
                <p class="text-xs text-stone-500 mt-0.5">Asset Reference ID: #00${item.id}</p>
              </div>
              <button class="text-xs text-blue-400 hover:underline">Copy Link</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderAnalytics() {
  const totalViews = state.analyticsLogs.reduce((acc, log) => acc + log.views, 0);
  return `
    <div class="fade-in">
      <header class="flex items-center justify-between mb-8 pb-4 border-b border-stone-800">
        <div>
          <h2 class="serif text-3xl font-light text-white">Performance Intelligence</h2>
          <p class="text-xs text-stone-500 mt-1">Audience impressions and reach auditing metric engine.</p>
        </div>
      </header>

      <section class="grid sm:grid-cols-2 gap-4 mb-8">
        <div class="bg-[#141211] border border-stone-800 rounded-xl p-5">
          <div class="text-xs uppercase tracking-wider text-stone-500 mb-2 font-medium">Aggregated Impressions</div>
          <div class="serif text-4xl font-light text-blue-400 num">${totalViews.toLocaleString()} <span class="text-stone-500 text-base font-sans font-normal">Views Logged</span></div>
        </div>
        <div class="bg-[#141211] border border-stone-800 rounded-xl p-5">
          <div class="text-xs uppercase tracking-wider text-stone-500 mb-2 font-medium">Estimated Content Velocity</div>
          <div class="serif text-4xl font-light text-emerald-500 num">+${Math.round(totalViews * 1.4).toLocaleString()} <span class="text-stone-500 text-base font-sans font-normal">Projected Reach</span></div>
        </div>
      </section>

      <div class="bg-[#141211] border border-stone-800 rounded-xl p-6 mb-6">
        <h3 class="text-sm font-medium text-stone-200 mb-4">Log Impressions Payload</h3>
        <form onsubmit="event.preventDefault(); window.__a.submitAnalytics(this);" class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <input name="views" type="number" required placeholder="Impressions (Views)" class="bg-stone-900 border border-stone-800 px-4 py-2 rounded-lg text-sm text-white ring-focus" />
          <input name="platform" required placeholder="Platform (e.g. IG Reels)" class="bg-stone-900 border border-stone-800 px-4 py-2 rounded-lg text-sm text-white ring-focus" />
          <button type="submit" class="bg-blue-600 text-white font-medium text-xs rounded-lg hover:bg-blue-500 transition py-2">Commit to Log</button>
        </form>
      </div>

      <div class="bg-[#141211] border border-stone-800 rounded-xl overflow-hidden">
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="text-stone-500 border-b border-stone-800 bg-stone-900/30 text-xs uppercase tracking-wider">
              <th class="px-5 py-3 font-medium">Timestamp</th>
              <th class="px-5 py-3 font-medium">Distribution Vector</th>
              <th class="px-5 py-3 font-medium">Metrics</th>
            </tr>
          </thead>
          <tbody>
            ${state.analyticsLogs.map(log => `
              <tr class="border-b border-stone-800/60 row-hover transition">
                <td class="px-5 py-3 text-stone-400 num">${fmtDate(log.date)}</td>
                <td class="px-5 py-3 text-stone-200 font-medium">${log.platform}</td>
                <td class="px-5 py-3 text-blue-400 font-mono text-xs font-semibold">${log.views.toLocaleString()} views</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function formHTML() {
  return `
    <div class="bg-[#141211] border border-stone-800 rounded-xl p-6 mb-6 fade-in shadow-xl">
      <form onsubmit="event.preventDefault(); window.__a.submitForm(this);" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <input name="name" required placeholder="Athlete Name *" class="bg-stone-900 border border-stone-800 px-4 py-2 rounded-lg text-sm text-white ring-focus" />
        <input name="ig" placeholder="@instagram handle" class="bg-stone-900 border border-stone-800 px-4 py-2 rounded-lg text-sm text-white ring-focus" />
        <input name="school" placeholder="High School Ecosystem" class="bg-stone-900 border border-stone-800 px-4 py-2 rounded-lg text-sm text-white ring-focus" />
        <input name="college" placeholder="Committed College Matrix" class="bg-stone-900 border border-stone-800 px-4 py-2 rounded-lg text-sm text-white ring-focus" />
        <div class="sm:col-span-2 flex gap-2 justify-end mt-2">
          <button type="button" onclick="window.__a.toggleForm()" class="px-4 py-2 text-xs text-stone-400 hover:text-white">Abort</button>
          <button type="submit" class="px-5 py-2 text-xs bg-blue-600 text-white rounded-lg hover:bg-blue-500 font-medium">Commit Pipeline</button>
        </div>
      </form>
    </div>
  `;
}

async function addLead(data) {
  const { error } = await supabase.from('leads').insert([{ user_id: state.user.id, ...data }]);
  if (error) alert('Pipeline Write Error: ' + error.message);
  state.showForm = false;
  loadData();
}

async function updateLead(id, patch) {
  const { error } = await supabase.from('leads').update(patch).eq('id', id);
  if (error) alert('Mutation error: ' + error.message);
  loadData();
}

async function deleteLead(id) {
  if (!confirm('Purge this record from cloud datastore?')) return;
  const { error } = await supabase.from('leads').delete().eq('id', id);
  loadData();
}

function escapeHtml(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

window.__a = {
  login: async () => { state.authLoading = true; render(); await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); },
  logout: async () => { await supabase.auth.signOut(); state.leads = []; render(); },
  setView: (view) => { state.currentView = view; render(); },
  setSearch: (v) => { state.search = v; render(); },
  updateLead, deleteLead,
  toggleForm: () => { state.showForm = !state.showForm; render(); },
  submitForm: (form) => {
    const fd = new FormData(form); const data = {};
    for (const [k, v] of fd.entries()) data[k] = v.trim();
    data.date = todayStr(); data.status = 'Sent';
    if (data.name) addLead(data);
  },
  submitAnalytics: (form) => {
    const fd = new FormData(form);
    state.analyticsLogs.unshift({
      date: todayStr(),
      platform: fd.get('platform').trim(),
      views: parseInt(fd.get('views')) || 0
    });
    form.reset();
    render();
  }
};

initAuth();
</script>
</body>
</html>
