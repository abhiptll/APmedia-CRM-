<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="APmedia">
<meta name="theme-color" content="#090807">
<title>APmedia Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0}

:root {
  --bg:#090807; --s1:#111010; --s2:#181614; --s3:#1F1C1A; --s4:#252220;
  --b1:#242120; --b2:#302C29; --b3:#3D3936;
  --tx:#EAE7E4; --mu:#78716B; --di:#3D3936;
  --bl:#3B82F6; --bl2:#1D4ED8; --blg:rgba(59,130,246,0.3);
  --gn:#10B981; --gng:rgba(16,185,129,0.3);
  --am:#F59E0B; --amg:rgba(245,158,11,0.4);
  --rd:#EF4444; --rdg:rgba(239,68,68,0.3);
  --pu:#8B5CF6; --pug:rgba(139,92,246,0.3);
  --sidebar:228px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}

html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
.serif{font-family:'Fraunces',serif;font-optical-sizing:auto}
.num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* ─── SHELL ──────────────────────────────────────────────────────────── */
#shell{display:flex;height:100dvh;padding-top:var(--st)}

/* ─── SIDEBAR ─────────────────────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;padding:26px 13px 20px;
  height:100%;overflow:hidden;
}
.logo{display:flex;align-items:center;gap:8px;padding:0 8px;margin-bottom:28px}
.logo-dot{width:8px;height:8px;background:var(--bl);border-radius:50%;box-shadow:0 0 12px var(--blg);flex-shrink:0}
.logo-text{font-family:'Fraunces',serif;font-size:19px;font-weight:300;color:var(--tx);letter-spacing:-0.02em;line-height:1}
.logo-text em{color:var(--di);font-style:italic}
.nav-group-label{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--di);font-weight:700;padding:0 10px;margin:18px 0 5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;border:1px solid transparent;background:none;width:100%;text-align:left;transition:all 0.12s;font-family:inherit}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.on{color:#93C5FD;background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.2)}
.ni .nb{margin-left:auto;background:var(--am);color:#000;font-size:9px;font-weight:700;border-radius:20px;padding:2px 6px}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--b1)}
.sidebar-email{font-size:11px;color:var(--di);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;margin-bottom:7px}
.signout{background:none;border:none;cursor:pointer;font-size:11px;color:#7F1D1D;font-family:inherit;padding:0 4px}

/* ─── MAIN ─────────────────────────────────────────────────────────────── */
#main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg);padding:34px 38px 40px;display:flex;flex-direction:column}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--b1)}
.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:white;letter-spacing:-0.03em;line-height:1}
.page-sub{font-size:12px;color:var(--mu);margin-top:5px}

/* ─── STAT CARDS ────────────────────────────────────────────────────────── */
.sg{display:grid;gap:11px;margin-bottom:20px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:15px;padding:17px 19px}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--di);font-weight:700;margin-bottom:7px}
.sv{font-family:'Fraunces',serif;font-size:33px;font-weight:300;letter-spacing:-0.02em;line-height:1}
.ss{font-size:11px;color:var(--mu);margin-top:6px}
.pb{background:var(--s3);border-radius:99px;height:3px;margin-top:9px;overflow:hidden}
.pbf{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ─── BUTTONS ───────────────────────────────────────────────────────────── */
.btn{font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:10px;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-blue{background:var(--bl);color:white;padding:10px 17px;font-size:13px;box-shadow:0 0 18px rgba(59,130,246,0.22)}
.btn-blue:hover{background:var(--bl2)}
.btn-blue:disabled{opacity:0.5;cursor:default}
.btn-ghost{background:transparent;color:var(--mu);padding:9px 13px;font-size:13px;border:1px solid var(--b2)}
.btn-ghost:hover{color:var(--tx);border-color:var(--b3)}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--di);font-size:20px;line-height:1;padding:3px 6px;border-radius:7px;transition:all .12s;font-family:inherit}
.btn-icon:hover{color:var(--rd);background:rgba(239,68,68,0.1)}

/* ─── STATUS DOTS ───────────────────────────────────────────────────────── */
.dot{display:inline-block;border-radius:50%;flex-shrink:0}
.d-sent{width:9px;height:9px;background:#6B7280}
.d-responded{width:9px;height:9px;background:var(--bl);box-shadow:0 0 8px var(--blg)}
.d-followup{width:9px;height:9px;background:var(--am);box-shadow:0 0 8px var(--amg)}
.d-closed{width:9px;height:9px;background:var(--gn);box-shadow:0 0 8px var(--gng)}
.d-ni{width:9px;height:9px;background:var(--rd);box-shadow:0 0 8px var(--rdg)}

/* ─── INPUTS ─────────────────────────────────────────────────────────────── */
.field{background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 13px;border-radius:10px;width:100%;transition:border-color .15s;-webkit-appearance:none}
.field::placeholder{color:var(--di)}
.field:focus{outline:none;border-color:var(--bl);background:var(--s3)}
textarea.field{resize:vertical;min-height:68px;line-height:1.5}
select.field{cursor:pointer}

/* ─── CARD / TABLE ──────────────────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:15px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.th{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--di);font-weight:700;padding:10px 16px;text-align:left;background:rgba(15,14,13,0.7);border-bottom:1px solid var(--b1)}
.td{padding:12px 16px;border-bottom:1px solid rgba(36,33,32,0.5);vertical-align:middle}
.tr{transition:background .1s}
.tr:hover{background:rgba(24,22,20,0.8)}
.tr:last-child .td{border-bottom:none}

/* ─── TOOLBAR ───────────────────────────────────────────────────────────── */
.toolbar{padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;gap:9px;align-items:center;flex-wrap:wrap;background:rgba(12,11,10,0.5)}
.pill{font-size:11px;font-weight:500;padding:5px 10px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}
.pill:hover{color:var(--tx);border-color:var(--b2)}
.pill.on{background:var(--s3);border-color:var(--b2);color:var(--tx)}

/* ─── FORM PANEL ──────────────────────────────────────────────────────────── */
.fp{background:var(--s1);border:1px solid var(--b2);border-radius:15px;padding:20px;margin-bottom:16px;animation:fadeUp .16s ease-out}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ff{grid-column:1/-1}

/* ─── SECTION CARD ──────────────────────────────────────────────────────── */
.sec{background:var(--s1);border:1px solid var(--b1);border-radius:15px;padding:20px;margin-bottom:14px}
.sec-title{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--di);font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* ─── MODAL ──────────────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.mbox{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:26px;width:100%;max-height:90dvh;overflow-y:auto;animation:scaleIn .18s cubic-bezier(.34,1.56,.64,1)}
.mhead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.mtitle{font-size:15px;font-weight:600;color:var(--tx)}
.msub{font-size:11px;color:var(--mu);margin-top:3px}

/* ─── LOGIN ───────────────────────────────────────────────────────────────── */
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:32px}
.login-card{background:var(--s1);border:1px solid var(--b2);border-radius:22px;padding:44px 40px;width:100%;max-width:340px;text-align:center}
.g-btn{width:100%;padding:13px 20px;background:var(--s2);border:1px solid var(--b2);border-radius:12px;color:var(--tx);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:26px}
.g-btn:hover{background:var(--s3)}

/* ─── PKG CARD ────────────────────────────────────────────────────────────── */
.pkg{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;position:relative;transition:border-color .15s}
.pkg:hover{border-color:var(--b2)}
.pkg-del{position:absolute;top:9px;right:9px;background:none;border:none;color:var(--di);font-size:15px;cursor:pointer;opacity:0;transition:all .15s;padding:0;line-height:1}
.pkg:hover .pkg-del{opacity:1}
.pkg-del:hover{color:var(--rd)}

/* ─── ALERT ────────────────────────────────────────────────────────────────── */
.alert{background:rgba(120,53,15,0.15);border:1px solid rgba(217,119,6,0.25);border-radius:12px;padding:12px 15px;margin-bottom:16px;display:flex;align-items:flex-start;gap:9px}

/* ─── DM MODAL ─────────────────────────────────────────────────────────────── */
.dm-out{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:15px 17px;font-size:13.5px;line-height:1.7;color:var(--tx);min-height:90px;white-space:pre-wrap;margin:14px 0}
.dm-out.loading{color:var(--mu);font-style:italic;display:flex;align-items:center;gap:10px}
.spin{width:15px;height:15px;border:2px solid var(--b2);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.vtab{font-size:11px;font-weight:500;padding:5px 11px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--mu);cursor:pointer;font-family:inherit;transition:all .12s}
.vtab:hover,.vtab.on{background:var(--bl);color:white;border-color:var(--bl)}

/* ─── CHECKLIST ─────────────────────────────────────────────────────────────── */
.cl-item{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid rgba(36,33,32,0.5)}
.cl-item:last-child{border-bottom:none}
.cl-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--b2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.cl-check.done{background:var(--gn);border-color:var(--gn)}
.cl-check svg{opacity:0;transition:opacity .15s}
.cl-check.done svg{opacity:1}
.cl-title{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3}
.cl-sub{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.5}
.cl-link{font-size:11px;color:var(--bl);text-decoration:none;margin-top:4px;display:inline-block}
.cl-link:hover{text-decoration:underline}
.cl-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:0.05em;margin-left:7px}
.cb-stripe{background:rgba(139,92,246,0.15);color:#C4B5FD;border:1px solid rgba(139,92,246,0.25)}
.cb-ig{background:rgba(239,68,68,0.12);color:#FCA5A5;border:1px solid rgba(239,68,68,0.2)}
.cb-pixieset{background:rgba(16,185,129,0.1);color:#6EE7B7;border:1px solid rgba(16,185,129,0.2)}
.cb-brand{background:rgba(59,130,246,0.1);color:#93C5FD;border:1px solid rgba(59,130,246,0.2)}
.section-divider{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--di);font-weight:700;padding:16px 0 8px;display:flex;align-items:center;gap:10px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ─── QUICK ACTION ──────────────────────────────────────────────────────────── */
.qa{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.qa:hover{border-color:var(--b2);background:var(--s3)}
.qa-icon{font-size:20px;margin-bottom:5px;display:block}
.qa-l{font-size:12px;font-weight:600;color:var(--tx)}
.qa-s{font-size:11px;color:var(--mu);margin-top:2px}

/* ─── TAG ─────────────────────────────────────────────────────────────────── */
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:0.04em}
.tag-sport{background:rgba(59,130,246,0.1);color:#93C5FD;border:1px solid rgba(59,130,246,0.18)}

/* ─── PRICE INPUT ─────────────────────────────────────────────────────────── */
.price-in{background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--gn);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;font-variant-numeric:tabular-nums;outline:none;width:58px;padding:2px 0;transition:border-color .15s}
.price-in:focus{border-color:var(--gn)}
.price-in::placeholder{color:var(--di);font-weight:400}

/* ─── STATUS SELECT ─────────────────────────────────────────────────────────── */
.ss-sel{background:transparent;border:none;color:var(--mu);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none;padding:0}

/* ─── INLINE EDIT ───────────────────────────────────────────────────────────── */
.ie{background:transparent;border:none;font-family:'DM Sans',sans-serif;color:var(--mu);font-size:12px;outline:none;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;padding:0;width:100%;max-width:140px}
.ie:focus{border-color:var(--di);color:var(--tx)}

/* ─── EMPTY ──────────────────────────────────────────────────────────────────── */
.empty{padding:52px 24px;text-align:center;color:var(--mu);font-size:13px}
.empty-ico{font-size:32px;opacity:0.25;margin-bottom:10px}

/* ─── DASHBOARD GRID ─────────────────────────────────────────────────────────── */
.dash-top{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.dash-mid{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px}
.activity-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(36,33,32,0.4)}
.activity-row:last-child{border-bottom:none}
.client-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(36,33,32,0.4)}
.client-row:last-child{border-bottom:none}

/* ─── ANIMATIONS ────────────────────────────────────────────────────────────── */
.fade{animation:fadeUp .2s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}

/* ─── SETUP PROGRESS RING ────────────────────────────────────────────────────── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
svg.ring{transform:rotate(-90deg)}
.ring-text{position:absolute;font-size:13px;font-weight:700;color:var(--tx);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="root"></div>

<script>
const {createClient} = window.supabase;
const SB = createClient("https://nyawnrewrjsmmqmkkdig.supabase.co","sb_publishable_Fjuz60z2vdbF49NIufoHfA_AyTHgfb5");

const STATUSES = ['Sent','Responded','Follow Up','Closed','Not Interested'];
const DOTMAP = {Sent:'d-sent',Responded:'d-responded','Follow Up':'d-followup',Closed:'d-closed','Not Interested':'d-ni'};
const SPORTS = ['Football','Basketball','Baseball','Soccer','Lacrosse','Wrestling','Track','Tennis','Volleyball','Other'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let A = {
  user:null, view:'home', leads:[], filter:'All', search:'',
  showForm:false, confirmDel:null,
  dmLead:null, dmText:'', dmVariant:0, dmLoading:false,
  authLoading:false,
  packages:[
    {id:1,name:'Commitment Post',price:25,desc:'1 graphic post for commitment announcement'},
    {id:2,name:'Highlight Reel',price:75,desc:'60-sec edited highlight, music, graphics'},
    {id:3,name:'Full Mixtape',price:150,desc:'3-5 min mixtape, 2 revisions, social cuts'},
    {id:4,name:'Social Pack',price:250,desc:'Mixtape + 3 short clips + story covers'},
  ],
  settings:{dailyGoal:10,revenueGoal:500},
  checklist:{},
};

// ── STORAGE ───────────────────────────────────────────────────────────────────
const lk = k=>`ap3_${k}_${A.user?.id}`;
const lss = (k,v)=>{try{if(A.user)localStorage.setItem(lk(k),JSON.stringify(v))}catch{}};
const lsg = (k,fb)=>{try{const v=localStorage.getItem(lk(k));return v?JSON.parse(v):fb}catch{return fb}};
const exk = ()=>`ap3_ex_${A.user?.id}`;
const exl = ()=>{try{return JSON.parse(localStorage.getItem(exk())||'{}')}catch{return{}}};
const exs = m=>localStorage.setItem(exk(),JSON.stringify(m));
const exg = id=>exl()[id]||{};
const ext = (id,p)=>{const m=exl();m[id]={...m[id],...p};exs(m)};
const merge = leads=>{const ex=exl();return leads.map(l=>({...l,...(ex[l.id]||{})}))};

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function boot(){
  const {data:{session}}=await SB.auth.getSession();
  A.user=session?.user??null;
  SB.auth.onAuthStateChange((_,s)=>{A.user=s?.user??null;A.user?loadAll():render()});
  A.user?loadAll():render();
}
async function loadAll(){
  const {data,error}=await SB.from('leads').select('*').order('created_at',{ascending:false});
  if(!error&&data)A.leads=merge(data);
  A.packages=lsg('packages',A.packages);
  A.settings={...A.settings,...lsg('settings',{})};
  A.checklist=lsg('checklist',{});
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const fd=s=>{if(!s)return'';const d=s.slice(0,10).split('-');return`${+d[1]}/${+d[2]}`};
const esc=s=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
function stats(){
  const all=A.leads,n=all.length,t=today();
  const st=all.filter(l=>(l.date||'').startsWith(t)).length;
  const re=all.filter(l=>['Responded','Closed'].includes(l.status)).length;
  const cl=all.filter(l=>l.status==='Closed').length;
  const rv=all.reduce((s,l)=>s+(parseFloat(l.price)||0),0);
  return{n,st,re,cl,rv,
    rr:n?Math.round(re/n*100):0,
    cr:n?Math.round(cl/n*100):0,
    gp:A.settings.revenueGoal?Math.min(100,Math.round(rv/A.settings.revenueGoal*100)):0,
    dp:A.settings.dailyGoal?Math.min(100,Math.round(st/A.settings.dailyGoal*100)):0,
    rem:Math.max(0,A.settings.dailyGoal-st),
    avg:cl?(rv/cl).toFixed(0):0
  };
}
function stale(){return A.leads.filter(l=>l.status==='Sent'&&(Date.now()-new Date(l.date||l.created_at))/864e5>=3)}
function filtered(){
  let l=[...A.leads];
  if(A.filter!=='All')l=l.filter(x=>x.status===A.filter);
  if(A.search.trim()){const q=A.search.trim().toLowerCase();l=l.filter(x=>(x.name||'').toLowerCase().includes(q)||(x.school||'').toLowerCase().includes(q)||(x.ig||'').toLowerCase().includes(q))}
  return l;
}
function clDone(){return Object.values(A.checklist).filter(Boolean).length}
const CL_TOTAL=14;

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(!A.user){root.innerHTML=loginHTML();return}
  const sl=stale().length,s=stats();
  let content='';
  if(A.view==='home')content=homeHTML(s,sl);
  else if(A.view==='pipeline')content=pipeHTML(s,sl);
  else if(A.view==='revenue')content=revHTML(s);
  else if(A.view==='setup')content=setupHTML();
  root.innerHTML=`
    <div id="shell">
      ${sidebarHTML(sl)}
      <div id="main">${content}</div>
    </div>
    ${A.confirmDel?delModal():''}
    ${A.dmLead?dmModal():''}`;
}

        </div>`}
    </div>
  </div>`;
}

// ── AI ────────────────────────────────────────────────────────────────────────
const PROMPTS={
  0:l=>`You write Instagram DMs for a sports media editor named APmedia who films and edits highlight reels and commitment videos for high school athletes.

Write a short, genuine cold DM to ${l.name}${l.college?`, who just committed to ${l.college}`:' (high school athlete)'}${l.sport?` for ${l.sport}`:''}${l.school?` from ${l.school}`:''}.

Rules:
- Sound like a real person, not a marketing email
- Mention something specific about their commitment or sport
- Say you make highlight reels / commitment videos
- Ask if they're interested
- 3-4 sentences MAX
- One emoji at most
- No hashtags, no "Hey there!", no corporate speak

Write ONLY the message. No intro, no quotes.`,

  1:l=>`You write Instagram DMs for APmedia, a sports media editor.

Write a short follow-up DM to ${l.name}${l.college?` (committed to ${l.college})`:''} who hasn't responded to the first message yet.

Rules:
- Acknowledge you reached out before, keep it light
- Not desperate or pushy
- 2-3 sentences max
- Give them an easy way to just say yes or ask a question
- Sound like a real person following up

Write ONLY the message.`,

  2:l=>`You write comments/DMs for APmedia, a sports media editor.

Write a reply to ${l.name}'s commitment post${l.college?` announcing they committed to ${l.college}`:''}${l.sport?` to play ${l.sport}`:''}.

Rules:
- Genuinely congratulate them first, be specific
- Naturally bring up that you make commitment videos / highlight reels
- Ask if they'd want one
- 2-3 sentences, sounds like a real comment not an ad
- One emoji max

Write ONLY the message.`
};

async function callAI(prompt){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    return d.content?.[0]?.text||'Error — try again.';
  }catch(e){return'Network error — check your connection.'}
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function addLead(d){
  const row={user_id:A.user.id,name:d.name,ig:d.ig,school:d.school,college:d.college,date:d.date,status:d.status};
  const {data,error}=await SB.from('leads').insert([row]).select().single();
  if(error){alert('Error: '+error.message);return}
  if(data?.id)ext(data.id,{price:d.price||0,sport:d.sport||'',notes:d.notes||''});
  A.showForm=false;
  loadAll();
}

window.AP={
  login:async()=>{A.authLoading=true;render();await SB.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}})},
  logout:async()=>{await SB.auth.signOut();A.leads=[];render()},
  go:v=>{A.view=v;A.showForm=false;A.filter='All';render()},
  search:v=>{A.search=v;render()},
  filter:v=>{A.filter=v;render()},
  openForm:()=>{A.showForm=true;render()},
  closeForm:()=>{A.showForm=false;render()},

  submitForm(form){
    const fd=new FormData(form),d={};
    for(const[k,v]of fd.entries())d[k]=(v||'').trim();
    d.price=d.pkg_price==='custom'?parseFloat(d.custom_price)||0:parseFloat(d.pkg_price)||0;
    delete d.pkg_price;delete d.custom_price;
    d.date=today();d.status='Sent';
    if(d.name)addLead(d);
  },

  setStatus:async(id,status)=>{
    await SB.from('leads').update({status}).eq('id',id);
    const l=A.leads.find(x=>x.id===id);if(l)l.status=status;render();
  },
  setPrice:(id,val)=>{
    const price=parseFloat(val)||0;
    ext(id,{price});
    const l=A.leads.find(x=>x.id===id);if(l)l.price=price;render();
  },
  setNotes:(id,val)=>{ext(id,{notes:val});const l=A.leads.find(x=>x.id===id);if(l)l.notes=val},

  confirmDelete:id=>{A.confirmDel=id;render()},
  cancelDel:()=>{A.confirmDel=null;render()},
  deleteLead:async id=>{
    await SB.from('leads').delete().eq('id',id);
    const ex=exl();delete ex[id];exs(ex);
    A.leads=A.leads.filter(l=>l.id!==id);
    A.confirmDel=null;render();
  },

  saveSettings(form){
    const fd=new FormData(form);
    A.settings.dailyGoal=Math.max(1,parseInt(fd.get('dailyGoal'))||10);
    A.settings.revenueGoal=Math.max(0,parseInt(fd.get('revenueGoal'))||500);
    lss('settings',A.settings);render();
  },
  addPkg(){
    const name=prompt('Package name:');if(!name)return;
    const price=prompt('Price ($):');if(!price)return;
    const desc=prompt('Description:')||'';
    A.packages.push({id:Date.now(),name:name.trim(),price:parseInt(price)||0,desc:desc.trim()});
    lss('packages',A.packages);render();
  },
  delPkg(i){
    if(!confirm(`Remove "${A.packages[i]?.name}"?`))return;
    A.packages.splice(i,1);lss('packages',A.packages);render();
  },

  toggleCheck(id){
    A.checklist[id]=!A.checklist[id];
    lss('checklist',A.checklist);render();
  },

  openDM(id){
    const l=A.leads.find(x=>x.id===id);if(!l)return;
    A.dmLead=l;A.dmText='';A.dmVariant=0;A.dmLoading=false;render();
  },
  closeDM(){A.dmLead=null;A.dmText='';A.dmLoading=false;render()},
  setDMVariant(i){A.dmVariant=i;A.dmText='';render()},
  async generateDM(){
    if(!A.dmLead)return;
    A.dmLoading=true;A.dmText='';render();
    A.dmText=await callAI(PROMPTS[A.dmVariant](A.dmLead));
    A.dmLoading=false;render();
  },
  copyDM(){
    if(!A.dmText)return;
    navigator.clipboard.writeText(A.dmText).then(()=>{
      const b=document.getElementById('cpbtn');
      if(b){b.textContent='✓ Copied!';b.style.color='var(--gn)';setTimeout(()=>render(),1800)}
    });
  },
  markSent(id){
    SB.from('leads').update({status:'Sent'}).eq('id',id);
    const l=A.leads.find(x=>x.id===id);if(l)l.status='Sent';
    A.dmLead=null;A.dmText='';render();
  },
};
