<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="APmedia">
<meta name="theme-color" content="#0A0908">
<title>APmedia Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;margin:0;padding:0}

:root {
  --bg:       #0A0908;
  --s1:       #111010;
  --s2:       #181614;
  --s3:       #1F1D1B;
  --border:   #252220;
  --border2:  #302C2A;
  --text:     #EAE7E4;
  --muted:    #7C756F;
  --dim:      #3D3936;
  --blue:     #3B82F6;
  --blue2:    #1D4ED8;
  --glow-b:   rgba(59,130,246,0.35);
  --green:    #10B981;
  --glow-g:   rgba(16,185,129,0.35);
  --amber:    #F59E0B;
  --red:      #EF4444;
  --sidebar:  220px;
  --safe-t:   env(safe-area-inset-top, 0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
}

html,body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; overflow: hidden; }
.serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
.num   { font-variant-numeric: tabular-nums; font-feature-settings:'tnum'; }

/* ── SCROLLBARS ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.noscroll::-webkit-scrollbar { display: none; }

/* ── APP SHELL ──────────────────────────────────────────────────────── */
#shell {
  display: flex;
  height: 100dvh;
  padding-top: var(--safe-t);
}

/* ── SIDEBAR ────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 28px 14px 20px;
  gap: 0;
  height: 100%;
  overflow: hidden;
}
.wordmark {
  padding: 0 8px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wordmark-dot {
  width: 8px; height: 8px;
  background: var(--blue);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--glow-b);
  flex-shrink: 0;
}
.wordmark-text {
  font-size: 19px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
}
.wordmark-text em { color: var(--dim); font-style: italic; }

.nav-section-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--dim);
  font-weight: 600;
  padding: 0 10px;
  margin: 20px 0 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 10px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border: 1px solid transparent;
  background: none;
  width: 100%;
  text-align: left;
  transition: all 0.12s;
  position: relative;
}
.nav-item:hover { color: var(--text); background: var(--s2); }
.nav-item.on {
  color: #93C5FD;
  background: rgba(59,130,246,0.1);
  border-color: rgba(59,130,246,0.2);
}
.nav-item .badge {
  margin-left: auto;
  background: var(--amber);
  color: #000;
  font-size: 9px;
  font-weight: 700;
  border-radius: 20px;
  padding: 2px 6px;
  line-height: 1.4;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.sidebar-email {
  font-size: 11px;
  color: var(--dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 4px;
  margin-bottom: 8px;
}
.signout-btn {
  background: none; border: none; cursor: pointer;
  font-size: 11px; color: #7F1D1D; font-family: inherit;
  padding: 0 4px;
}

/* ── MAIN ───────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
  padding: 36px 40px 40px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── PAGE HEADER ────────────────────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--border);
}
.page-title {
  font-size: 30px;
  font-weight: 300;
  color: white;
  letter-spacing: -0.03em;
  line-height: 1;
}
.page-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 5px;
}

/* ── STAT CARDS ─────────────────────────────────────────────────────── */
.stat-grid { display: grid; gap: 12px; margin-bottom: 22px; }
.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
}
.stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  font-weight: 600;
  margin-bottom: 8px;
}
.stat-value {
  font-size: 34px;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}
.pbar { background: var(--s3); border-radius: 99px; height: 3px; margin-top: 10px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

/* ── BUTTONS ────────────────────────────────────────────────────────── */
.btn {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  border: none;
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-blue {
  background: var(--blue);
  color: white;
  padding: 10px 18px;
  font-size: 13px;
  box-shadow: 0 0 20px rgba(59,130,246,0.25);
}
.btn-blue:hover { background: var(--blue2); box-shadow: 0 0 28px rgba(59,130,246,0.4); }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  padding: 9px 14px;
  font-size: 13px;
  border: 1px solid var(--border2);
}
.btn-ghost:hover { color: var(--text); border-color: #3D3936; }
.btn-icon {
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 20px; line-height: 1;
  padding: 3px 7px; border-radius: 7px; transition: all 0.12s;
}
.btn-icon:hover { color: var(--red); background: rgba(239,68,68,0.1); }

/* ── STATUS DOTS ────────────────────────────────────────────────────── */
.dot { display: inline-block; border-radius: 50%; flex-shrink: 0; }
.dot-sent     { width:9px;height:9px;background:#6B7280; }
.dot-responded{ width:9px;height:9px;background:var(--blue);box-shadow:0 0 8px var(--glow-b); }
.dot-followup { width:9px;height:9px;background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,0.5); }
.dot-closed   { width:9px;height:9px;background:var(--green);box-shadow:0 0 8px var(--glow-g); }
.dot-ni       { width:9px;height:9px;background:var(--red);box-shadow:0 0 8px rgba(239,68,68,0.4); }

/* ── CARD / TABLE ───────────────────────────────────────────────────── */
.card { background: var(--s1); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.tbl { width: 100%; border-collapse: collapse; }
.tbl-th {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  font-weight: 700;
  padding: 11px 18px;
  text-align: left;
  background: rgba(15,14,13,0.7);
  border-bottom: 1px solid var(--border);
}
.tbl-td { padding: 13px 18px; border-bottom: 1px solid rgba(37,34,32,0.6); vertical-align: middle; }
.tbl-row:last-child .tbl-td { border-bottom: none; }
.tbl-row { transition: background 0.1s; }
.tbl-row:hover { background: rgba(24,22,20,0.8); }

/* ── FIELDS ─────────────────────────────────────────────────────────── */
.field {
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 10px;
  width: 100%;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.field::placeholder { color: var(--dim); }
.field:focus { outline: none; border-color: var(--blue); background: var(--s3); }
textarea.field { resize: vertical; min-height: 70px; line-height: 1.5; }
select.field { cursor: pointer; }

/* ── ALERT BAR ──────────────────────────────────────────────────────── */
.alert-bar {
  background: linear-gradient(135deg, rgba(120,53,15,0.18), rgba(78,36,10,0.12));
  border: 1px solid rgba(217,119,6,0.28);
  border-radius: 12px;
  padding: 13px 16px;
  margin-bottom: 18px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  animation: fadeUp 0.2s ease-out;
}

/* ── FILTER PILLS ───────────────────────────────────────────────────── */
.pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  font-size: 11px; font-weight: 500;
  padding: 5px 11px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all 0.12s;
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'DM Sans', sans-serif;
}
.pill:hover { color: var(--text); border-color: var(--border2); }
.pill.on { background: var(--s3); border-color: var(--border2); color: var(--text); }

/* ── TOOLBAR ────────────────────────────────────────────────────────── */
.toolbar {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: rgba(15,14,13,0.4);
}

/* ── FORM PANEL ─────────────────────────────────────────────────────── */
.form-panel {
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 18px;
  animation: fadeUp 0.16s ease-out;
}
.form-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-full { grid-column: 1 / -1; }

/* ── PACKAGE CARDS ──────────────────────────────────────────────────── */
.pkg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 10px; }
.pkg-card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 15px;
  position: relative;
  transition: border-color 0.15s;
}
.pkg-card:hover { border-color: var(--border2); }
.pkg-del {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: var(--dim);
  font-size: 16px; cursor: pointer; line-height: 1;
  opacity: 0; transition: opacity 0.15s, color 0.15s;
  padding: 0;
}
.pkg-card:hover .pkg-del { opacity: 1; }
.pkg-del:hover { color: var(--red); }

/* ── MODAL ──────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(8px);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-box {
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 28px;
  width: 100%; max-width: 460px;
  max-height: 90dvh;
  overflow-y: auto;
  animation: scaleIn 0.18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes scaleIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.modal-title { font-size: 15px; font-weight: 600; color: var(--text); }

/* ── LOGIN ──────────────────────────────────────────────────────────── */
.login-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 32px;
}
.login-card {
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 22px;
  padding: 44px 40px;
  width: 100%; max-width: 360px;
  text-align: center;
}
.google-btn {
  width: 100%;
  padding: 13px 20px;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 13px;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  margin-top: 28px;
}
.google-btn:hover { background: var(--s3); border-color: #3D3936; }

/* ── SECTION CARD ───────────────────────────────────────────────────── */
.section-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 16px;
}
.section-card-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── QUICK ACTIONS ──────────────────────────────────────────────────── */
.quick-action {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
}
.quick-action:hover { border-color: var(--border2); background: var(--s3); }
.qa-icon { font-size: 22px; margin-bottom: 6px; display: block; }
.qa-label { font-size: 12px; font-weight: 600; color: var(--text); }
.qa-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── CLOSE CLIENT ROWS ──────────────────────────────────────────────── */
.client-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(37,34,32,0.5);
}
.client-row:last-child { border-bottom: none; }

/* ── PRICE INPUT ────────────────────────────────────────────────────── */
.price-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--green);
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  font-variant-numeric: tabular-nums;
  outline: none;
  width: 60px;
  padding: 2px 0;
  transition: border-color 0.15s;
}
.price-input:focus { border-color: var(--green); }
.price-input::placeholder { color: var(--dim); font-weight: 400; }

/* ── STATUS SELECT ──────────────────────────────────────────────────── */
.status-select {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
  padding: 0;
}

/* ── ANIMATIONS ─────────────────────────────────────────────────────── */
.fade { animation: fadeUp 0.2s ease-out; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

/* ── INLINE EDIT ────────────────────────────────────────────────────── */
.inline-edit {
  background: transparent; border: none;
  font-family: 'DM Sans', sans-serif;
  color: var(--muted); font-size: 12px;
  outline: none; cursor: pointer;
  border-bottom: 1px dashed transparent;
  transition: border-color 0.15s;
  padding: 0;
}
.inline-edit:focus { border-color: var(--dim); color: var(--text); }

/* ── EMPTY STATE ────────────────────────────────────────────────────── */
.empty {
  padding: 56px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
.empty-icon { font-size: 36px; opacity: 0.3; margin-bottom: 12px; }

/* ── TAG ────────────────────────────────────────────────────────────── */
.tag {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 5px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.tag-sport { background: rgba(59,130,246,0.12); color: #93C5FD; border: 1px solid rgba(59,130,246,0.2); }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ── SUPABASE ─────────────────────────────────────────────────────────────────
const { createClient } = window.supabase;
const SB = createClient(
  "https://nyawnrewrjsmmqmkkdig.supabase.co",
  "sb_publishable_Fjuz60z2vdbF49NIufoHfA_AyTHgfb5"
);

const STATUSES = ['Sent','Responded','Follow Up','Closed','Not Interested'];
const DOT_MAP = {
  'Sent':'dot-sent','Responded':'dot-responded',
  'Follow Up':'dot-followup','Closed':'dot-closed','Not Interested':'dot-ni'
};
const SPORTS = ['Football','Basketball','Baseball','Soccer','Lacrosse','Wrestling','Track','Tennis','Volleyball','Other'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let app = {
  user: null,
  view: 'pipeline',
  leads: [],
  settings: { dailyGoal: 10, revenueGoal: 500 },
  packages: [
    { id:1, name:'Highlight Reel', price:25,  desc:'60-sec game highlight, 1 revision' },
    { id:2, name:'Full Mixtape',   price:75,  desc:'3–5 min mixtape, music + graphics, 2 revisions' },
    { id:3, name:'Social Pack',    price:150, desc:'3× short clips + full highlight + story covers' },
  ],
  filter: 'All',
  search: '',
  showForm: false,
  confirmDel: null,
  dmLead: null,
  dmText: '',
  dmVariant: 0,
  dmLoading: false,
  authLoading: false,
};

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
const lk = k => `ap2_${k}_${app.user?.id}`;
const lsSet = (k,v) => { try { if(app.user) localStorage.setItem(lk(k), JSON.stringify(v)); } catch{} };
const lsGet = (k,fb) => { try { const v=localStorage.getItem(lk(k)); return v?JSON.parse(v):fb; } catch{ return fb; } };

// Extra fields (price, sport, notes) keyed by Supabase lead id
const exKey = () => `ap2_extra_${app.user?.id}`;
const exLoad = () => { try{ return JSON.parse(localStorage.getItem(exKey())||'{}'); }catch{ return{}; } };
const exSave = m => localStorage.setItem(exKey(), JSON.stringify(m));
const exGet  = id => exLoad()[id] || {};
const exSet  = (id, patch) => { const m=exLoad(); m[id]={...m[id],...patch}; exSave(m); };

function mergeExtras(leads) {
  const ex = exLoad();
  return leads.map(l => ({ ...l, ...(ex[l.id]||{}) }));
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function boot() {
  const { data:{ session } } = await SB.auth.getSession();
  app.user = session?.user ?? null;
  SB.auth.onAuthStateChange((_,s) => {
    app.user = s?.user ?? null;
    app.user ? loadAll() : render();
  });
  app.user ? loadAll() : render();
}

async function loadAll() {
  const { data, error } = await SB.from('leads').select('*').order('created_at', { ascending: false });
  if (!error && data) app.leads = mergeExtras(data);
  app.packages = lsGet('packages', app.packages);
  app.settings = { ...app.settings, ...lsGet('settings', {}) };
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = s => {
  if (!s) return '';
  const d = s.slice(0,10).split('-');
  return `${parseInt(d[1])}/${parseInt(d[2])}`;
};
const e = s => (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

function stats() {
  const all = app.leads, n = all.length, t = today();
  const sentToday = all.filter(l=>(l.date||'').startsWith(t)).length;
  const responded = all.filter(l=>['Responded','Closed'].includes(l.status)).length;
  const closed    = all.filter(l=>l.status==='Closed').length;
  const revenue   = all.reduce((s,l)=>s+(parseFloat(l.price)||0), 0);
  return {
    n, sentToday, responded, closed, revenue,
    rr: n ? Math.round(responded/n*100) : 0,
    cr: n ? Math.round(closed/n*100) : 0,
    goalPct: app.settings.revenueGoal ? Math.min(100, Math.round(revenue/app.settings.revenueGoal*100)) : 0,
    dmPct: app.settings.dailyGoal ? Math.min(100, Math.round(sentToday/app.settings.dailyGoal*100)) : 0,
    remaining: Math.max(0, app.settings.dailyGoal - sentToday),
    avgDeal: closed ? (revenue/closed).toFixed(0) : 0,
  };
}

function staleLeads() {
  return app.leads.filter(l => {
    if (l.status !== 'Sent') return false;
    return (Date.now() - new Date(l.date || l.created_at)) / 864e5 >= 3;
  });
}

function filteredLeads() {
  let list = [...app.leads];
  if (app.filter !== 'All') list = list.filter(l => l.status === app.filter);
  if (app.search.trim()) {
    const q = app.search.trim().toLowerCase();
    list = list.filter(l =>
      (l.name||'').toLowerCase().includes(q) ||
      (l.school||'').toLowerCase().includes(q) ||
      (l.ig||'').toLowerCase().includes(q) ||
      (l.college||'').toLowerCase().includes(q)
    );
  }
  return list;
}

// ── RENDER ENTRY ──────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');

  if (!app.user) {
    root.innerHTML = loginHTML();
    return;
  }

  const stale = staleLeads();
  const s = stats();

  root.innerHTML = `
    <div id="shell">
      ${sidebarHTML(stale.length)}
      <div id="main">
        ${app.view === 'pipeline' ? pipelineHTML(s, stale) : revenueHTML(s)}
      </div>
    </div>
    ${app.confirmDel ? confirmModal() : ''}
    ${app.dmLead ? dmModal() : ''}
  `;
}

        }
      </div>

      <!-- Actions -->
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-blue" onclick="A.generateDM()" ${app.dmLoading?'disabled':''} style="flex:1">
          ${app.dmLoading ? 'Generating…' : '⚡ Generate'}
        </button>
        ${app.dmText ? `
          <button id="copy-btn" onclick="A.copyDM()" class="btn btn-ghost" style="flex:1">
            Copy DM
          </button>
        ` : ''}
        ${app.dmText ? `
          <button onclick="A.generateDM()" class="btn btn-ghost" title="Regenerate" style="padding:9px 12px">↺</button>
        ` : ''}
      </div>

      ${app.dmText ? `
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="font-size:10px;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em">After you send it →</div>
          <button onclick="A.markSent('${l.id}')" style="font-size:12px;color:var(--green);background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);padding:7px 14px;border-radius:9px;cursor:pointer;font-family:inherit;transition:all 0.12s">
            ✓ Mark as Sent & Close
          </button>
        </div>
      ` : ''}
    </div>
  </div>`;
}

// ── AI DM GENERATION ─────────────────────────────────────────────────────────
const DM_PROMPTS = {
  0: (l) => `You are a sports media editor who films and edits highlight reels for high school athletes. Write a short, casual Instagram DM to send to ${l.name}${l.college ? `, who just committed to ${l.college}` : ''}${l.sport ? ` to play ${l.sport}` : ''}${l.school ? ` from ${l.school}` : ''}.

The message should:
- Sound like a real person, not a business pitch
- Congratulate them on their commitment (if they have one)
- Mention you saw their post or commitment
- Briefly say you make highlight reels / commitment videos for athletes
- Ask if they'd be interested
- Be 3-4 sentences max, no hashtags, no emojis spam (1 max)
- Sound genuine and personal, not copy-paste

Just write the message itself, nothing else. No quotes around it.`,

  1: (l) => `You are a sports media editor following up on an Instagram DM you sent to ${l.name}${l.college ? `, committed to ${l.college}` : ''}${l.sport ? ` (${l.sport})` : ''}. They haven't replied yet.

Write a short, casual follow-up message that:
- References that you reached out before
- Is not pushy or desperate
- Keeps it light and brief (2-3 sentences)
- Gives them an easy way to respond
- Sounds natural like a real person texting

Just write the message itself, nothing else.`,

  2: (l) => `You are a sports media editor replying to ${l.name}'s commitment announcement post on Instagram${l.college ? ` (committed to ${l.college})` : ''}${l.sport ? ` for ${l.sport}` : ''}.

Write a comment or DM reply that:
- Congratulates them genuinely and specifically
- Naturally transitions into mentioning you make commitment videos / highlight reels
- Asks if they'd want one
- Is 2-3 sentences, sounds real not salesy
- Feels like it belongs in their comments

Just write the message, nothing else.`
};

async function callAI(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || 'Error generating message. Try again.';
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function addLead(d) {
  const sbRow = {
    user_id: app.user.id,
    name: d.name, ig: d.ig, school: d.school,
    college: d.college, date: d.date, status: d.status
  };
  const { data, error } = await SB.from('leads').insert([sbRow]).select().single();
  if (error) { alert('Supabase error: ' + error.message); return; }
  if (data?.id) exSet(data.id, { price: d.price||0, sport: d.sport||'', notes: d.notes||'' });
  app.showForm = false;
  loadAll();
}

window.A = {
  login: async () => {
    app.authLoading = true; render();
    await SB.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin + location.pathname } });
  },
  logout: async () => { await SB.auth.signOut(); app.leads=[]; render(); },
  go: v => { app.view=v; app.showForm=false; app.filter='All'; render(); },
  search: v => { app.search=v; render(); },
  filter: v => { app.filter=v; render(); },
  openForm: () => { app.showForm=true; render(); },
  closeForm: () => { app.showForm=false; render(); },

  submitForm(form) {
    const fd = new FormData(form), d = {};
    for (const [k,v] of fd.entries()) d[k] = (v||'').trim();
    d.price = d.pkg_price === 'custom'
      ? parseFloat(d.custom_price)||0
      : parseFloat(d.pkg_price)||0;
    delete d.pkg_price; delete d.custom_price;
    d.date = today(); d.status = 'Sent';
    if (d.name) addLead(d);
  },

  setStatus: async (id, status) => {
    await SB.from('leads').update({ status }).eq('id', id);
    const l = app.leads.find(x=>x.id===id);
    if (l) l.status = status;
    render();
  },

  setPrice: (id, val) => {
    const price = parseFloat(val)||0;
    exSet(id, { price });
    const l = app.leads.find(x=>x.id===id);
    if (l) l.price = price;
    render();
  },

  setNotes: (id, val) => {
    exSet(id, { notes: val });
    const l = app.leads.find(x=>x.id===id);
    if (l) l.notes = val;
    // no full re-render needed — just save
  },

  confirmDelete: id => { app.confirmDel = id; render(); },
  cancelDel: () => { app.confirmDel = null; render(); },
  deleteLead: async id => {
    await SB.from('leads').delete().eq('id', id);
    const ex = exLoad(); delete ex[id]; exSave(ex);
    app.leads = app.leads.filter(l => l.id !== id);
    app.confirmDel = null;
    render();
  },

  saveSettings(form) {
    const fd = new FormData(form);
    app.settings.dailyGoal   = Math.max(1, parseInt(fd.get('dailyGoal'))||10);
    app.settings.revenueGoal = Math.max(0, parseInt(fd.get('revenueGoal'))||500);
    lsSet('settings', app.settings);
    render();
  },

  addPkg() {
    const name  = prompt('Package name:');  if (!name) return;
    const price = prompt('Price ($):');     if (!price) return;
    const desc  = prompt('Short description:') || '';
    app.packages.push({ id: Date.now(), name: name.trim(), price: parseInt(price)||0, desc: desc.trim() });
    lsSet('packages', app.packages);
    render();
  },
  delPkg(i) {
    if (!confirm(`Remove "${app.packages[i]?.name}"?`)) return;
    app.packages.splice(i,1);
    lsSet('packages', app.packages);
    render();
  },

  // ── DM Generator ──────────────────────────────────────────────────────
  openDM(id) {
    const l = app.leads.find(x => x.id === id);
    if (!l) return;
    app.dmLead = l;
    app.dmText = '';
    app.dmVariant = 0;
    app.dmLoading = false;
    render();
  },
  closeDM() {
    app.dmLead = null;
    app.dmText = '';
    app.dmLoading = false;
    render();
  },
  setDMVariant(i) {
    app.dmVariant = i;
    app.dmText = '';
    render();
  },
  async generateDM() {
    if (!app.dmLead) return;
    app.dmLoading = true;
    app.dmText = '';
    render();
    const prompt = DM_PROMPTS[app.dmVariant](app.dmLead);
    app.dmText = await callAI(prompt);
    app.dmLoading = false;
    render();
  },
  copyDM() {
    if (!app.dmText) return;
    navigator.clipboard.writeText(app.dmText).then(() => {
      const btn = document.getElementById('copy-btn');
      if (btn) {
        btn.textContent = '✓ Copied!';
        btn.style.color = 'var(--green)';
        btn.style.borderColor = 'rgba(16,185,129,0.3)';
        setTimeout(() => render(), 1800);
      }
    });
  },
  markSent(id) {
    // Mark lead as Sent and close modal
    SB.from('leads').update({ status: 'Sent' }).eq('id', id);
    const l = app.leads.find(x=>x.id===id);
    if (l) l.status = 'Sent';
    app.dmLead = null;
    app.dmText = '';
    render();
  },
};

boot();
</script>
