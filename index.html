<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0A09">
<title>APmedia Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  :root {
    --bg: #0C0A09;
    --surface: #141211;
    --surface2: #1A1816;
    --border: #242120;
    --border2: #2E2B29;
    --text: #E7E5E4;
    --muted: #78716C;
    --dim: #44403C;
    --blue: #3B82F6;
    --blue-dim: rgba(59,130,246,0.12);
    --green: #10B981;
    --amber: #F59E0B;
    --red: #EF4444;
  }
  body { font-family: 'Geist', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100dvh; overscroll-behavior: none; }
  .serif { font-family: 'Fraunces', serif; }
  .num { font-variant-numeric: tabular-nums; }
  
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Status dots */
  .dot { display: inline-block; border-radius: 50%; flex-shrink: 0; }
  .dot-sent     { background: #6B7280; width:9px; height:9px; }
  .dot-responded{ background: var(--blue); width:9px; height:9px; box-shadow: 0 0 7px rgba(59,130,246,0.6); }
  .dot-followup { background: var(--amber); width:9px; height:9px; box-shadow: 0 0 7px rgba(245,158,11,0.6); }
  .dot-closed   { background: var(--green); width:9px; height:9px; box-shadow: 0 0 7px rgba(16,185,129,0.6); }
  .dot-ni       { background: var(--red); width:9px; height:9px; box-shadow: 0 0 7px rgba(239,68,68,0.6); }

  /* Inputs */
  .field {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Geist', sans-serif; font-size: 14px;
    padding: 10px 14px; border-radius: 10px; width: 100%; transition: border-color 0.15s;
  }
  .field::placeholder { color: var(--dim); }
  .field:focus { outline: none; border-color: var(--blue); }
  select.field { cursor: pointer; }

  /* Buttons */
  .btn { font-family: 'Geist', sans-serif; border: none; cursor: pointer; border-radius: 10px; font-weight: 500; transition: all 0.15s; }
  .btn-blue { background: var(--blue); color: white; padding: 10px 18px; font-size: 13px; }
  .btn-blue:hover { background: #2563EB; }
  .btn-ghost { background: transparent; color: var(--muted); padding: 9px 14px; font-size: 13px; border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger { background: transparent; color: var(--dim); font-size: 18px; padding: 2px 8px; border-radius: 6px; line-height: 1; }
  .btn-danger:hover { color: var(--red); background: rgba(239,68,68,0.1); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }

  /* Table */
  .tbl-th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); font-weight: 600; padding: 10px 16px; text-align: left; }
  .tbl-td { padding: 13px 16px; border-bottom: 1px solid rgba(36,33,32,0.7); font-size: 13px; }
  .tbl-row:hover { background: rgba(26,24,22,0.7); }
  .tbl-row:last-child td { border-bottom: none; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 0; backdrop-filter: blur(6px); }
  @media (min-width: 640px) { .modal-bg { align-items: center; padding: 24px; } }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 20px 20px 0 0;
    padding: 24px; width: 100%; max-height: 92dvh; overflow-y: auto;
    animation: slideUp 0.2s ease-out;
  }
  @media (min-width: 640px) { .modal-box { border-radius: 18px; max-width: 480px; animation: fadeIn 0.15s; } }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; display: block; }

  /* Alert badge */
  .alert-pill { background: rgba(120,53,15,0.2); border: 1px solid rgba(217,119,6,0.3); border-radius: 10px; padding: 12px 16px; }

  /* Pill filter */
  .pill { font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .pill:hover { color: var(--muted); border-color: var(--border2); }
  .pill.on { background: var(--surface2); border-color: var(--border2); color: var(--text); }

  /* Desktop sidebar */
  #sidebar { width: 210px; min-width: 210px; background: #0F0E0D; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; padding: 22px 14px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 10px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border: 1px solid transparent; background: none; width: 100%; transition: all 0.15s; }
  .nav-item:hover { color: var(--text); background: var(--surface); }
  .nav-item.on { color: #60A5FA; background: var(--blue-dim); border-color: rgba(59,130,246,0.2); }

  /* Mobile bottom nav */
  #bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(15,14,13,0.95); backdrop-filter: blur(20px) saturate(180%); border-top: 1px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
  .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; color: var(--dim); cursor: pointer; background: none; border: none; padding: 6px 0; transition: color 0.15s; }
  .bnav-item.on { color: #60A5FA; }
  .bnav-item svg { width: 22px; height: 22px; }

  /* Main scroll area */
  #main { flex: 1; overflow-y: auto; padding: 28px 32px; max-width: 1000px; }

  @media (max-width: 767px) {
    #sidebar { display: none !important; }
    #bottom-nav { display: flex; }
    #main { padding: 16px 16px 88px; width: 100%; }
    .stat-grid { grid-template-columns: 1fr 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }
    .desktop-only { display: none !important; }
  }

  .fade { animation: fadeIn 0.18s ease-out; }

  /* Progress bar */
  .pbar { background: var(--surface2); border-radius: 99px; height: 4px; overflow: hidden; }
  .pbar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  /* Package card */
  .pkg { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; position: relative; }
  .pkg:hover { border-color: var(--border2); }
  .pkg-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--dim); font-size: 16px; cursor: pointer; opacity: 0; transition: opacity 0.15s; padding: 0; line-height: 1; }
  .pkg:hover .pkg-del { opacity: 1; }
  .pkg-del:hover { color: var(--red); }

  .section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 26px; font-weight: 300; color: white; letter-spacing: -0.02em; margin: 0; }
  .section-sub { color: var(--dim); font-size: 12px; margin: 4px 0 0; }
  
  input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
</style>
</head>
<body>
<div id="app" style="display:flex;min-height:100dvh"></div>

<script type="module">
const SB_URL = "https://nyawnrewrjsmmqmkkdig.supabase.co";
const SB_KEY = "sb_publishable_Fjuz60z2vdbF49NIufoHfA_AyTHgfb5";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const STATUSES = ['Sent','Responded','Follow Up','Closed','Not Interested'];
const DOT = { Sent:'dot-sent', Responded:'dot-responded', 'Follow Up':'dot-followup', Closed:'dot-closed', 'Not Interested':'dot-ni' };

let $ = {
  user: null, view: 'crm', leads: [],
  packages: [ {id:1,name:'Highlight Reel',price:25,desc:'60-sec game highlight, 1 revision'}, {id:2,name:'Full Mixtape',price:75,desc:'3-5 min mixtape, music + graphics, 2 revisions'}, {id:3,name:'Social Pack',price:150,desc:'3× short clips + full highlight + covers'} ],
  settings: { dailyGoal:10, revenueGoal:500 },
  filter:'All', search:'', showForm:false, showModal:false, editId:null,
  authLoading:false,
};

// ── Persist ──────────────────────────────────────────────────────────────────
const lk = k => `ap_${k}_${$.user?.id}`;
const ls = (k,v) => { if ($.user) localStorage.setItem(lk(k), JSON.stringify(v)); };
const ll = (k,fb) => { if (!$.user) return fb; try { const v = localStorage.getItem(lk(k)); return v ? JSON.parse(v) : fb; } catch { return fb; } };

// ── Auth ──────────────────────────────────────────────────────────────────────
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  $.user = session?.user ?? null;
  sb.auth.onAuthStateChange((_,s) => { $.user = s?.user ?? null; $.user ? load() : render(); });
  $.user ? load() : render();
}

async function load() {
  const { data, error } = await sb.from('leads').select('*').order('created_at', { ascending: false });
  if (!error && data) $.leads = data;
  $.packages = ll('packages', $.packages);
  $.settings = { ...$.settings, ...ll('settings', {}) };
  render();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);
const fmt = s => { if (!s) return ''; const [,m,d] = (s||'').slice(0,10).split('-'); return `${+m}/${+d}`; };
const esc = s => (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

function stats() {
  const all = $.leads, total = all.length, t = today();
  const sentToday = all.filter(l => (l.date||'').startsWith(t)).length;
  const responded = all.filter(l => ['Responded','Closed'].includes(l.status)).length;
  const closed    = all.filter(l => l.status === 'Closed').length;
  const revenue   = all.reduce((sum, l) => sum + (parseFloat(l.price)||0), 0);
  return { total, sentToday, responded, closed, revenue,
    rr: total ? Math.round(responded/total*100) : 0,
    cr: total ? Math.round(closed/total*100) : 0,
    remaining: Math.max(0, $.settings.dailyGoal - sentToday) };
}

function stale() {
  return $.leads.filter(l => {
    if (l.status !== 'Sent') return false;
    return (Date.now() - new Date(l.date||l.created_at)) / 864e5 >= 3;
  });
}

function filtered() {
  let l = [...$.leads];
  if ($.filter !== 'All') l = l.filter(x => x.status === $.filter);
  if ($.search.trim()) {
    const q = $.search.trim().toLowerCase();
    l = l.filter(x => (x.name||'').toLowerCase().includes(q) || (x.school||'').toLowerCase().includes(q) || (x.ig||'').toLowerCase().includes(q));
  }
  return l;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!$.user) { app.innerHTML = loginHTML(); return; }

  const main = $.view === 'crm' ? renderCRM() : renderRevenue();
  const staleCount = stale().length;

  app.innerHTML = `
    <div id="sidebar">
      <div>
        <div class="serif" style="font-size:20px;font-weight:300;color:white;padding:4px 10px 0;margin-bottom:24px;letter-spacing:-0.01em">
          <span style="display:inline-block;width:7px;height:7px;background:var(--blue);border-radius:50%;vertical-align:middle;margin:0 5px 3px 0"></span>
          APmedia <em style="color:var(--dim)">hub</em>
        </div>
        <nav style="display:flex;flex-direction:column;gap:3px">
          ${ni('crm','Pipeline',pipeIcon(), staleCount ? `<span style="background:var(--amber);color:#000;font-size:9px;font-weight:700;border-radius:20px;padding:2px 6px;margin-left:auto">${staleCount}</span>` : '')}
          ${ni('rev','Revenue',revIcon())}
        </nav>
      </div>
      <div style="padding:0 6px;border-top:1px solid var(--border);padding-top:14px">
        <div style="font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px">${esc($.user?.email||'')}</div>
        <button onclick="A.logout()" style="font-size:11px;color:#7F1D1D;background:none;border:none;cursor:pointer;padding:0">Sign out</button>
      </div>
    </div>
    <div id="main">${main}</div>
    <nav id="bottom-nav">
      ${bni('crm','Pipeline',pipeIcon(), staleCount)}
      ${bni('rev','Revenue',revIcon())}
    </nav>
    ${$.showModal ? modalHTML() : ''}
  `;

  // rebind file input
  const f = document.getElementById('vf');
  if (f) f.addEventListener('change', e => { window.__pf = e.target.files; });
}

function ni(v, label, icon, badge='') {
  return `<button onclick="A.go('${v}')" class="nav-item${$.view===v?' on':''}">
    ${icon}<span style="flex:1;text-align:left">${label}</span>${badge}
  </button>`;
}
function bni(v, label, icon, badge=0) {
  return `<button onclick="A.go('${v}')" class="bnav-item${$.view===v?' on':''}">
    ${icon}
    <span>${label}</span>
    ${badge ? `<span style="position:absolute;top:4px;background:var(--amber);color:#000;font-size:8px;font-weight:700;border-radius:10px;padding:1px 4px">${badge}</span>` : ''}
  </button>`;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function loginHTML() {
  return `<div style="min-height:100dvh;width:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;background:var(--bg)">
    <div style="max-width:340px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;text-align:center">
      <div class="serif" style="font-size:36px;font-weight:300;color:white;letter-spacing:-0.02em;margin-bottom:6px">
        <span style="display:inline-block;width:8px;height:8px;background:var(--blue);border-radius:50%;vertical-align:middle;margin:0 5px 4px 0"></span>
        APmedia <em style="color:var(--dim)">hub</em>
      </div>
      <p style="color:var(--dim);font-size:13px;margin:0 0 28px">Daily pipeline & revenue dashboard.</p>
      <button onclick="A.login()" ${$.authLoading?'disabled':''} style="width:100%;padding:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:Geist,sans-serif;transition:background 0.15s">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        ${$.authLoading ? 'Signing in...' : 'Continue with Google'}
      </button>
    </div>
  </div>`;
}

// ── CRM ───────────────────────────────────────────────────────────────────────
function renderCRM() {
  const s = stats(), list = filtered(), late = stale();
  return `<div class="fade">
    <div class="section-header">
      <div>
        <h2 class="serif section-title">Pipeline</h2>
        <p class="section-sub">Athlete outreach & deal tracking.</p>
      </div>
      <button class="btn btn-blue" onclick="A.openForm()">+ Add Athlete</button>
    </div>

    ${late.length ? `
      <div class="alert-pill" style="margin-bottom:16px;display:flex;align-items:flex-start;gap:10px">
        <span class="dot dot-followup" style="margin-top:2px;flex-shrink:0"></span>
        <div>
          <div style="font-size:12px;font-weight:600;color:#FCD34D;margin-bottom:5px">${late.length} lead${late.length>1?'s':''} waiting 3+ days — time to follow up</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">${late.map(l=>`<span style="font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:6px">${esc(l.name)}</span>`).join('')}</div>
        </div>
      </div>
    ` : ''}

    <div class="stat-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
      <div class="stat-card">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Today's DMs</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:white">${s.sentToday}<span style="color:var(--dim);font-size:16px;font-family:Geist,sans-serif"> /${$.settings.dailyGoal}</span></div>
        <div class="pbar" style="margin-top:8px"><div class="pbar-fill" style="width:${Math.min(100,Math.round(s.sentToday/$.settings.dailyGoal*100))}%;background:var(--blue)"></div></div>
      </div>
      <div class="stat-card">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Reply Rate</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:var(--blue)">${s.rr}%</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">${s.responded} of ${s.total} replied</div>
      </div>
      <div class="stat-card">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Closed</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:var(--green)">${s.closed}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">${s.cr}% close rate</div>
      </div>
      <div class="stat-card">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Revenue</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:var(--green)">$${s.revenue.toFixed(0)}</div>
        <div class="pbar" style="margin-top:8px"><div class="pbar-fill" style="width:${Math.min(100,$.settings.revenueGoal?Math.round(s.revenue/$.settings.revenueGoal*100):0)}%;background:var(--green)"></div></div>
      </div>
    </div>

    ${$.showForm ? formHTML() : ''}

    <div class="card" style="overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input type="text" placeholder="Search…" value="${esc($.search)}" oninput="A.search(this.value)"
          class="field" style="flex:1;min-width:140px;padding:8px 12px;font-size:13px" />
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${['All',...STATUSES].map(f=>`
            <button onclick="A.filter('${f}')" class="pill${$.filter===f?' on':''}">
              ${f!=='All'?`<span class="dot ${DOT[f]}" style="width:6px;height:6px"></span>`:''}${f==='Follow Up'?'Follow Up':f}
            </button>`).join('')}
        </div>
      </div>

      <!-- Desktop table -->
      <div class="desktop-only" style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:rgba(15,14,13,0.8)">
              <th class="tbl-th">Athlete</th>
              <th class="tbl-th">High School</th>
              <th class="tbl-th">College</th>
              <th class="tbl-th">Status</th>
              <th class="tbl-th">Price</th>
              <th class="tbl-th">Date</th>
              <th class="tbl-th"></th>
            </tr>
          </thead>
          <tbody>
            ${list.length===0?`<tr><td colspan="7" style="padding:48px;text-align:center;color:var(--dim);font-size:13px">No athletes yet — hit + Add Athlete to start.</td></tr>`:''}
            ${list.map(l=>`
              <tr class="tbl-row">
                <td class="tbl-td">
                  <div style="font-weight:500;color:var(--text)">${esc(l.name)}</div>
                  ${l.ig?`<div style="font-size:11px;color:var(--dim)">${esc(l.ig)}</div>`:''}
                </td>
                <td class="tbl-td" style="color:var(--muted);font-size:12px">${esc(l.school||'—')}</td>
                <td class="tbl-td" style="color:var(--muted);font-size:12px">${esc(l.college||'—')}</td>
                <td class="tbl-td">
                  <div style="display:flex;align-items:center;gap:7px">
                    <span class="dot ${DOT[l.status]||'dot-sent'}"></span>
                    <select onchange="A.setStatus('${l.id}',this.value)"
                      style="background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:Geist,sans-serif;outline:none;padding:0;-webkit-appearance:none">
                      ${STATUSES.map(st=>`<option value="${st}" ${st===l.status?'selected':''} style="background:#1A1816;color:var(--text)">${st}</option>`).join('')}
                    </select>
                  </div>
                </td>
                <td class="tbl-td">
                  <div style="display:flex;align-items:center;gap:4px">
                    <span style="color:var(--dim);font-size:12px">$</span>
                    <input type="number" min="0" value="${l.price||''}" placeholder="0"
                      onchange="A.setPrice('${l.id}',this.value)"
                      style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--green);font-size:13px;font-weight:600;font-family:Geist,sans-serif;outline:none;width:56px;padding:2px 0;font-variant-numeric:tabular-nums" />
                  </div>
                </td>
                <td class="tbl-td num" style="color:var(--dim);font-size:11px">${fmt(l.date||l.created_at)}</td>
                <td class="tbl-td" style="text-align:right">
                  <button class="btn btn-danger" onclick="A.del('${l.id}')">×</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <!-- Mobile cards -->
      <div style="display:none" class="mobile-list" id="mobile-list">
        ${list.length===0?`<div style="padding:40px;text-align:center;color:var(--dim);font-size:13px">No athletes — tap + Add Athlete.</div>`:''}
        ${list.map(l=>`
          <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
              <div>
                <div style="font-weight:600;color:var(--text);font-size:14px">${esc(l.name)}</div>
                ${l.ig?`<div style="font-size:11px;color:var(--dim);margin-top:1px">${esc(l.ig)}</div>`:''}
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="color:var(--green);font-size:14px;font-weight:700;font-variant-numeric:tabular-nums">$${l.price||'—'}</span>
                <button class="btn btn-danger" onclick="A.del('${l.id}')">×</button>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="dot ${DOT[l.status]||'dot-sent'}"></span>
              <select onchange="A.setStatus('${l.id}',this.value)"
                style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;font-family:Geist,sans-serif;border-radius:7px;padding:4px 8px;outline:none">
                ${STATUSES.map(st=>`<option value="${st}" ${st===l.status?'selected':''} style="background:#1A1816">${st}</option>`).join('')}
              </select>
              ${l.school?`<span style="font-size:11px;color:var(--dim)">${esc(l.school)}</span>`:''}
              <span style="font-size:11px;color:var(--dim);margin-left:auto">${fmt(l.date||l.created_at)}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

// ── Revenue ───────────────────────────────────────────────────────────────────
function renderRevenue() {
  const s = stats(), goalPct = $.settings.revenueGoal ? Math.min(100,Math.round(s.revenue/$.settings.revenueGoal*100)) : 0;
  const closed = $.leads.filter(l => l.status==='Closed');
  const byPkg = {};
  $.leads.forEach(l => { const p = l.price||0; if (p > 0 && l.status==='Closed') byPkg[p] = (byPkg[p]||0)+1; });

  return `<div class="fade">
    <div class="section-header">
      <div>
        <h2 class="serif section-title">Revenue Hub</h2>
        <p class="section-sub">Packages, goals, and booking history.</p>
      </div>
    </div>

    <div class="stat-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
      <div class="stat-card" style="grid-column:1/2">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Total Revenue</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:var(--green)">$${s.revenue.toFixed(0)}</div>
        <div class="pbar" style="margin-top:8px"><div class="pbar-fill" style="width:${goalPct}%;background:var(--green)"></div></div>
        <div style="font-size:10px;color:var(--dim);margin-top:5px">${goalPct}% of $${$.settings.revenueGoal} goal</div>
      </div>
      <div class="stat-card">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Clients Closed</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:white">${s.closed}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">${s.cr}% close rate</div>
      </div>
      <div class="stat-card">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--dim);margin-bottom:6px">Avg Per Client</div>
        <div class="serif num" style="font-size:32px;font-weight:300;color:var(--blue)">$${s.closed ? (s.revenue/s.closed).toFixed(0) : 0}</div>
      </div>
    </div>

    <!-- Settings -->
    <div class="card" style="padding:20px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.05em">Goals</div>
      <form onsubmit="event.preventDefault();A.saveSettings(this)" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:11px;color:var(--dim);display:block;margin-bottom:5px">Daily DM Goal</label>
          <input name="dailyGoal" type="number" min="1" value="${$.settings.dailyGoal}" class="field" />
        </div>
        <div>
          <label style="font-size:11px;color:var(--dim);display:block;margin-bottom:5px">Monthly Revenue Goal ($)</label>
          <input name="revenueGoal" type="number" min="0" value="${$.settings.revenueGoal}" class="field" />
        </div>
        <div style="grid-column:1/-1;display:flex;justify-content:flex-end">
          <button type="submit" class="btn btn-blue" style="padding:9px 16px;font-size:12px">Save Goals</button>
        </div>
      </form>
    </div>

    <!-- Packages -->
    <div class="card" style="padding:20px;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.05em">Service Packages</div>
        <button onclick="A.addPkg()" style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:Geist,sans-serif">+ Add</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
        ${$.packages.map((p,i)=>`
          <div class="pkg">

            <div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:2px">$${p.price}</div>
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">${esc(p.name)}</div>
            <div style="font-size:11px;color:var(--dim);line-height:1.4">${esc(p.desc)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Closed clients -->
    ${closed.length ? `
      <div class="card" style="overflow:hidden">

              <span class="dot dot-closed"></span>
              <div>
                <div style="font-size:13px;font-weight:500;color:var(--text)">${esc(l.name)}</div>
                ${l.school?`<div style="font-size:11px;color:var(--dim)">${esc(l.school)}</div>`:''}
              </div>
            </div>
            <div style="text-align:right">
              <div class="num" style="font-size:14px;font-weight:700;color:var(--green)">+$${l.price||0}</div>

          <span style="font-size:12px;color:var(--dim)">Total</span>

        </div>
      </div>
    ` : `<div class="card" style="padding:32px;text-align:center;color:var(--dim);font-size:13px">No closed deals yet — keep pushing the pipeline!</div>`}
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function addLead(d) {
  const { error } = await sb.from('leads').insert([{ user_id: $.user.id, ...d }]);
  if (error) alert('Error: ' + error.message);
  $.showForm = false;
  load();
}

window.A = {
  login: async () => { $.authLoading = true; render(); await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin+location.pathname } }); },
  logout: async () => { await sb.auth.signOut(); $.leads=[]; render(); },
  go: (v) => { $.view=v; $.showForm=false; render(); },
  search: (v) => { $.search=v; render(); },
  filter: (v) => { $.filter=v; render(); },
  openForm: () => { $.showForm=true; render(); },
  closeForm: () => { $.showForm=false; render(); },

  submitForm(form) {
    const fd = new FormData(form);
    const d = {};
    for (const [k,v] of fd.entries()) d[k] = v.trim();
    const isCust = d.price === 'custom';
    d.price = isCust ? parseFloat(d.price_custom)||0 : parseFloat(d.price)||0;
    delete d.price_custom;
    d.date = today(); d.status = 'Sent';
    if (d.name) addLead(d);
  },

  setStatus: async (id, status) => {
    await sb.from('leads').update({ status }).eq('id', id);
    load();
  },
  setPrice: async (id, price) => {
    await sb.from('leads').update({ price: parseFloat(price)||0 }).eq('id', id);
    load();
  },
  del: async (id) => {
    if (!confirm('Remove this athlete?')) return;
    await sb.from('leads').delete().eq('id', id);
    load();
  },

  saveSettings(form) {
    const fd = new FormData(form);
    $.settings.dailyGoal   = Math.max(1, parseInt(fd.get('dailyGoal'))||10);
    $.settings.revenueGoal = Math.max(0, parseInt(fd.get('revenueGoal'))||500);
    ls('settings', $.settings);
    render();
  },

  addPkg() {
    const name  = prompt('Package name:');  if (!name) return;
    const price = prompt('Price ($):');     if (!price) return;
    const desc  = prompt('Description:') || '';
    $.packages.push({ id: Date.now(), name:name.trim(), price:parseInt(price)||0, desc:desc.trim() });
    ls('packages', $.packages);
    render();
  },
  delPkg(i) {
    $.packages.splice(i,1);
    ls('packages', $.packages);
    render();
  }
};

// Handle custom price toggle
document.addEventListener('change', e => {
  if (e.target?.name === 'price') {
    const cf = document.getElementById('custom-price-field');
    if (cf) cf.style.display = e.target.value === 'custom' ? 'block' : 'none';
  }
});

// Show mobile list on mobile
function applyMobileLayout() {
  const isMobile = window.innerWidth < 768;
  const desktopTable = document.querySelector('.desktop-only');
  const mobileList = document.getElementById('mobile-list');
  if (desktopTable) desktopTable.style.display = isMobile ? 'none' : 'block';
  if (mobileList) mobileList.style.display = isMobile ? 'block' : 'none';
}
window.addEventListener('resize', applyMobileLayout);
document.addEventListener('DOMContentLoaded', applyMobileLayout);

// Observe renders
const obs = new MutationObserver(applyMobileLayout);
obs.observe(document.getElementById('app'), { childList:true, subtree:true });

boot();
</script>
